<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>DBBA INDIA</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050816] text-white">

  <!-- AUTH SCREEN -->

  <div id="authScreen"
  class="fixed inset-0 bg-black z-50 flex items-center justify-center p-5 overflow-auto">

    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 w-full max-w-md">

      <!-- LOGIN PAGE -->

      <div id="loginPage">

        <h2 class="text-4xl font-black text-center mb-2">
          <span class="text-yellow-400">DBBA</span>
          <span class="text-green-400">INDIA</span>
        </h2>

        <p class="text-center text-gray-400 mb-6">
          Login To Continue
        </p>

        <input
        id="loginInput"
        type="text"
        placeholder="Email or Phone Number"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"/>

        <input
        id="loginPassword"
        type="password"
        placeholder="Password"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-6 outline-none"/>

        <button
        onclick="login()"
        class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black py-4 rounded-2xl mb-4">
        LOGIN
        </button>

        <button
        onclick="openSignup()"
        class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-2xl">
        CREATE ACCOUNT
        </button>

      </div>

      <!-- SIGNUP PAGE -->

      <div id="signupPage" class="hidden">

        <h2 class="text-4xl font-black text-center mb-2">
          Create Account
        </h2>

        <p class="text-center text-gray-400 mb-6">
          Join DBBA INDIA
        </p>

        <input
        id="fullName"
        type="text"
        placeholder="Full Name"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"/>

        <input
        id="phone"
        type="text"
        placeholder="Phone Number"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"/>

        <input
        id="email"
        type="email"
        placeholder="Email Address"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"/>

        <input
        id="password"
        type="password"
        placeholder="Password"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-6 outline-none"/>

        <button
        onclick="signup()"
        class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-2xl mb-4">
        CREATE ACCOUNT
        </button>

        <button
        onclick="closeSignup()"
        class="w-full bg-gray-700 hover:bg-gray-600 text-white font-black py-4 rounded-2xl">
        BACK TO LOGIN
        </button>

      </div>

    </div>

  </div>

  <!-- HEADER -->

  <header class="border-b border-gray-800 bg-black">

    <div class="max-w-7xl mx-auto flex justify-between items-center px-5 py-4">

      <div>

        <h1 class="text-4xl font-black">
          <span class="text-yellow-400">DBBA</span>
          <span class="text-green-400">INDIA</span>
        </h1>

        <p class="text-gray-400 text-sm">
          Predict • Play • Win
        </p>

      </div>

      <div class="flex items-center gap-4">

        <div class="bg-gray-900 px-5 py-3 rounded-2xl border border-gray-700">

          <p class="text-gray-400 text-sm">
            Balance
          </p>

          <h2 class="text-2xl font-bold text-yellow-400">
            12,500 Coins
          </h2>

        </div>

        <button
        onclick="logout()"
        class="bg-red-500 hover:bg-red-400 px-5 py-3 rounded-2xl font-bold">
        Logout
        </button>

      </div>

    </div>

  </header>

  <!-- TOP CARDS -->

  <section class="max-w-7xl mx-auto px-5 py-8">

    <div class="grid md:grid-cols-3 gap-5">

      <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6">

        <p class="text-gray-400 mb-3">
          Next Draw
        </p>

        <h2 class="text-5xl font-black text-yellow-400">
          09:15 AM
        </h2>

      </div>

      <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6 text-center">

        <p class="text-gray-400 mb-3">
          Next Draw In
        </p>

        <h2 id="timer"
        class="text-5xl font-black text-green-400">
        00:00:00
        </h2>

      </div>

      <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6">

        <p class="text-gray-400 mb-3">
          Reward
        </p>

        <h2 class="text-5xl font-black text-green-400">
          90x
        </h2>

      </div>

    </div>

  </section>

  <!-- MAIN -->

  <section class="max-w-7xl mx-auto px-5 grid lg:grid-cols-[1fr_350px] gap-6 pb-10">

    <!-- NUMBERS -->

    <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6">

      <div class="flex justify-between items-center mb-6">

        <h2 class="text-3xl font-black">
          Choose Your Number
        </h2>

        <div class="bg-green-500/10 border border-green-500/20 px-4 py-2 rounded-xl text-green-400">
          Virtual Game
        </div>

      </div>

      <div id="numbers"
      class="grid grid-cols-5 md:grid-cols-10 gap-3"></div>

    </div>

    <!-- BET SLIP -->

    <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6 h-fit">

      <h2 class="text-3xl font-black text-yellow-400 mb-6">
        Bet Slip
      </h2>

      <div class="mb-5">

        <p class="text-gray-400 mb-2">
          Selected Number
        </p>

        <div id="selected"
        class="bg-black border border-gray-700 rounded-2xl p-5 text-center text-6xl font-black text-green-400">
        00
        </div>

      </div>

      <div class="mb-5">

        <p class="text-gray-400 mb-2">
          Enter Coins
        </p>

        <input
        id="coins"
        type="number"
        value="1000"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 text-2xl outline-none"/>

      </div>

      <div class="bg-green-500/10 border border-green-500/20 rounded-2xl p-5 text-center mb-6">

        <p class="text-gray-400 mb-2">
          Potential Win
        </p>

        <h2 id="win"
        class="text-5xl font-black text-yellow-400">
        90000
        </h2>

        <p class="text-green-400 mt-2">
          90x Reward
        </p>

      </div>

      <button
      class="w-full bg-green-500 hover:bg-green-400 text-black text-2xl font-black py-4 rounded-2xl">
      PLACE BET
      </button>

    </div>

  </section>

  <script type="module">

    import {
      supabase
    } from "./supabase.js";

    // OPEN SIGNUP

    window.openSignup = function(){

      document.getElementById(
        "loginPage"
      ).classList.add("hidden");

      document.getElementById(
        "signupPage"
      ).classList.remove("hidden");
    }

    // CLOSE SIGNUP

    window.closeSignup = function(){

      document.getElementById(
        "signupPage"
      ).classList.add("hidden");

      document.getElementById(
        "loginPage"
      ).classList.remove("hidden");
    }

    // SIGNUP

    window.signup = async function(){

      const fullName =
        document.getElementById("fullName").value.trim();

      const phone =
        document.getElementById("phone").value.trim();

      const email =
        document.getElementById("email").value.trim();

      const password =
        document.getElementById("password").value.trim();

      // VALIDATION

      if(
        !fullName ||
        !phone ||
        !email ||
        !password
      ){
        alert("Please fill all fields");
        return;
      }

      // CREATE ACCOUNT

      const { data, error } =
        await supabase.auth.signUp({
          email,
          password
        });

      if(error){

        alert(error.message);
        return;
      }

      // SAVE USER DATA

      const userId =
        data.user.id;

      const { error: dbError } =
        await supabase
          .from("users")
          .insert([
            {
              id: userId,
              full_name: fullName,
              phone: phone,
              email: email
            }
          ]);

      if(dbError){

        alert(dbError.message);
        return;
      }

      // FORCE LOGOUT

      await supabase.auth.signOut();

      localStorage.removeItem(
        "manualLogin"
      );

      // SUCCESS MESSAGE

      alert(
        "Account Created Successfully! Please Login."
      );

      // OPEN LOGIN PAGE

      closeSignup();

      // AUTO FILL LOGIN

      document.getElementById(
        "loginInput"
      ).value = email;

      // CLEAR SIGNUP FORM

      document.getElementById(
        "fullName"
      ).value = "";

      document.getElementById(
        "phone"
      ).value = "";

      document.getElementById(
        "email"
      ).value = "";

      document.getElementById(
        "password"
      ).value = "";
    }

    // LOGIN

    window.login = async function(){

      const input =
        document.getElementById(
          "loginInput"
        ).value.trim();

      const password =
        document.getElementById(
          "loginPassword"
        ).value.trim();

      if(!input || !password){

        alert("Please fill all fields");
        return;
      }

      let email = input;

      // PHONE LOGIN

      if(!input.includes("@")){

        const { data } =
          await supabase
            .from("users")
            .select("*")
            .eq("phone", input)
            .single();

        if(!data){

          alert("Phone number not found");
          return;
        }

        email = data.email;
      }

      const { error } =
        await supabase.auth.signInWithPassword({
          email,
          password
        });

      if(error){

        alert(error.message);

      } else {

        localStorage.setItem(
          "manualLogin",
          "true"
        );

        document.getElementById(
          "authScreen"
        ).style.display = "none";
      }
    }

    // LOGOUT

    window.logout = async function(){

      localStorage.removeItem(
        "manualLogin"
      );

      await supabase.auth.signOut();

      location.reload();
    }

    // SESSION CHECK

    const {
      data: { session }
    } = await supabase.auth.getSession();

    if(session){

      const loginDone =
        localStorage.getItem(
          "manualLogin"
        );

      if(loginDone === "true"){

        document.getElementById(
          "authScreen"
        ).style.display = "none";
      }
    }

    // NUMBER GRID

    const numbersDiv =
      document.getElementById("numbers");

    const selectedDiv =
      document.getElementById("selected");

    for(let i=0;i<100;i++){

      const num =
        i.toString().padStart(2,"0");

      const btn =
        document.createElement("button");

      btn.innerText = num;

      btn.className =
        "bg-[#111827] border border-gray-700 rounded-2xl p-4 text-xl font-black hover:bg-green-500 hover:text-black transition";

      btn.onclick = () => {

        selectedDiv.innerText = num;
      };

      numbersDiv.appendChild(btn);
    }

    // WIN CALCULATION

    const coinsInput =
      document.getElementById("coins");

    const winText =
      document.getElementById("win");

    coinsInput.addEventListener("input", () => {

      winText.innerText =
        coinsInput.value * 90;
    });

    // TIMER

    function updateTimer(){

      const now = new Date();

      const target = new Date();

      target.setHours(9);
      target.setMinutes(15);
      target.setSeconds(0);

      if(now > target){
        target.setDate(
          target.getDate()+1
        );
      }

      const diff = target - now;

      const hrs =
        Math.floor(diff / 1000 / 60 / 60);

      const mins =
        Math.floor(diff / 1000 / 60) % 60;

      const secs =
        Math.floor(diff / 1000) % 60;

      document.getElementById(
        "timer"
      ).innerText =
        `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    updateTimer();

    setInterval(updateTimer,1000);

  </script>

</body>
</html>

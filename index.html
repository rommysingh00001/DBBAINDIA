<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>DBBA INDIA</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050816] text-white">

  <!-- AUTH SCREEN -->

  <div id="authScreen"
  class="fixed inset-0 bg-black z-50 flex items-center justify-center p-5 overflow-auto">

    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 w-full max-w-md">

      <!-- LOGIN PAGE -->

      <div id="loginPage">

        <h2 class="text-4xl font-black text-center mb-2">
          <span class="text-yellow-400">DBBA</span>
          <span class="text-green-400">INDIA</span>
        </h2>

        <p class="text-center text-gray-400 mb-6">
          Login To Continue
        </p>

        <input
        id="loginInput"
        type="text"
        placeholder="Email or Phone Number"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"/>

        <input
        id="loginPassword"
        type="password"
        placeholder="Password"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-6 outline-none"/>

        <button
        onclick="login()"
        class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black py-4 rounded-2xl mb-4">
        LOGIN
        </button>

        <button
        onclick="openSignup()"
        class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-2xl">
        CREATE ACCOUNT
        </button>

      </div>

      <!-- SIGNUP PAGE -->

      <div id="signupPage" class="hidden">

        <h2 class="text-4xl font-black text-center mb-2">
          Create Account
        </h2>

        <p class="text-center text-gray-400 mb-6">
          Join DBBA INDIA
        </p>

        <input
        id="fullName"
        type="text"
        placeholder="Full Name"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"/>

        <input
        id="phone"
        type="text"
        placeholder="Phone Number"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"/>

        <input
        id="email"
        type="email"
        placeholder="Email Address"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"/>

        <input
        id="password"
        type="password"
        placeholder="Password"
        class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-6 outline-none"/>

        <button
        onclick="signup()"
        class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-2xl mb-4">
        CREATE ACCOUNT
        </button>

        <button
        onclick="closeSignup()"
        class="w-full bg-gray-700 hover:bg-gray-600 text-white font-black py-4 rounded-2xl">
        BACK TO LOGIN
        </button>

      </div>

    </div>

  </div>

  <!-- MAIN WEBSITE -->

  <div id="mainWebsite" style="display:none;">

    <!-- HEADER -->

    <header class="border-b border-gray-800 bg-black">

      <div class="max-w-7xl mx-auto flex justify-between items-center px-5 py-4">

        <div>

          <h1 class="text-4xl font-black">
            <span class="text-yellow-400">DBBA</span>
            <span class="text-green-400">INDIA</span>
          </h1>

          <p class="text-gray-400 text-sm">
            Predict • Play • Win
          </p>

        </div>

        <button
        onclick="logout()"
        class="bg-red-500 hover:bg-red-400 px-5 py-3 rounded-2xl font-bold">
        Logout
        </button>

      </div>

    </header>

    <!-- TOP -->

    <section class="max-w-7xl mx-auto px-5 py-8">

      <div class="grid md:grid-cols-3 gap-5">

        <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6">

          <p class="text-gray-400 mb-3">
            Next Draw
          </p>

          <h2 class="text-5xl font-black text-yellow-400">
            09:15 AM
          </h2>

        </div>

        <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6 text-center">

          <p class="text-gray-400 mb-3">
            Next Draw In
          </p>

          <h2 id="timer"
          class="text-5xl font-black text-green-400">
          00:00:00
          </h2>

        </div>

        <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6">

          <p class="text-gray-400 mb-3">
            Reward
          </p>

          <h2 class="text-5xl font-black text-green-400">
            90x
          </h2>

        </div>

      </div>

    </section>

    <!-- NUMBERS -->

    <section class="max-w-7xl mx-auto px-5 pb-10">

      <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6">

        <h2 class="text-3xl font-black mb-6">
          Choose Your Number
        </h2>

        <div id="numbers"
        class="grid grid-cols-5 md:grid-cols-10 gap-3"></div>

      </div>

    </section>

  </div>

  <script type="module">

    import {
      supabase
    } from "./supabase.js";

    // OPEN SIGNUP

    window.openSignup = function(){

      document.getElementById(
        "loginPage"
      ).classList.add("hidden");

      document.getElementById(
        "signupPage"
      ).classList.remove("hidden");
    }

    // CLOSE SIGNUP

    window.closeSignup = function(){

      document.getElementById(
        "signupPage"
      ).classList.add("hidden");

      document.getElementById(
        "loginPage"
      ).classList.remove("hidden");
    }

    // SIGNUP

    window.signup = async function(){

      const fullName =
        document.getElementById("fullName").value.trim();

      const phone =
        document.getElementById("phone").value.trim();

      const email =
        document.getElementById("email").value.trim();

      const password =
        document.getElementById("password").value.trim();

      if(
        !fullName ||
        !phone ||
        !email ||
        !password
      ){
        alert("Please fill all fields");
        return;
      }

      const { data, error } =
        await supabase.auth.signUp({
          email,
          password
        });

      if(error){

        alert(error.message);
        return;
      }

      const userId =
        data.user.id;

      await supabase
        .from("users")
        .insert([
          {
            id: userId,
            full_name: fullName,
            phone: phone,
            email: email
          }
        ]);

      await supabase.auth.signOut();

      alert(
        "Account Created Successfully! Please Login."
      );

      closeSignup();

      document.getElementById(
        "loginInput"
      ).value = email;
    }

    // LOGIN

    window.login = async function(){

      const input =
        document.getElementById(
          "loginInput"
        ).value.trim();

      const password =
        document.getElementById(
          "loginPassword"
        ).value.trim();

      if(!input || !password){

        alert("Please fill all fields");
        return;
      }

      let email = input;

      // LOGIN WITH PHONE

      if(!input.includes("@")){

        const { data } =
          await supabase
            .from("users")
            .select("*")
            .eq("phone", input)
            .single();

        if(!data){

          alert("Phone number not found");
          return;
        }

        email = data.email;
      }

      const { error } =
        await supabase.auth.signInWithPassword({
          email,
          password
        });

      if(error){

        alert(error.message);

      } else {

        document.getElementById(
          "authScreen"
        ).style.display = "none";

        document.getElementById(
          "mainWebsite"
        ).style.display = "block";
      }
    }

    // LOGOUT

    window.logout = async function(){

      await supabase.auth.signOut();

      document.getElementById(
        "mainWebsite"
      ).style.display = "none";

      document.getElementById(
        "authScreen"
      ).style.display = "flex";
    }

    // NUMBER GRID

    const numbersDiv =
      document.getElementById("numbers");

    for(let i=0;i<100;i++){

      const num =
        i.toString().padStart(2,"0");

      const btn =
        document.createElement("button");

      btn.innerText = num;

      btn.className =
        "bg-[#111827] border border-gray-700 rounded-2xl p-4 text-xl font-black hover:bg-green-500 hover:text-black transition";

      numbersDiv.appendChild(btn);
    }

    // TIMER

    function updateTimer(){

      const now = new Date();

      const target = new Date();

      target.setHours(9);
      target.setMinutes(15);
      target.setSeconds(0);

      if(now > target){
        target.setDate(
          target.getDate()+1
        );
      }

      const diff = target - now;

      const hrs =
        Math.floor(diff / 1000 / 60 / 60);

      const mins =
        Math.floor(diff / 1000 / 60) % 60;

      const secs =
        Math.floor(diff / 1000) % 60;

      document.getElementById(
        "timer"
      ).innerText =
        `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    updateTimer();

    setInterval(updateTimer,1000);

  </script>

</body>
</html>

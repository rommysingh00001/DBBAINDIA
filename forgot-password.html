<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Forgot Password</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

<div class="bg-gray-900 p-8 rounded-3xl w-full max-w-md">

<h1 class="text-3xl font-black text-center mb-6 text-yellow-400">
Forgot Password
</h1>

<input
id="email"
type="email"
placeholder="Enter Email"
class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-5 outline-none"
/>

<button
onclick="resetPassword()"
class="w-full bg-green-500 text-black font-black py-4 rounded-2xl"
>

SEND RESET LINK

</button>

</div>

<script type="module">

import { supabase } from "./supabase.js";

window.resetPassword = async function(){

  const email =
    document.getElementById("email").value;

  if(!email){

    alert("Enter email");
    return;
  }

  const { error } =
    await supabase.auth.resetPasswordForEmail(
      email,
      {
        redirectTo:
          "https://dbbaindia.vercel.app/reset-password.html"
      }
    );

  if(error){

    alert(error.message);
    return;
  }

  alert("Password reset link sent to email");
};

</script>

</body>
</html>

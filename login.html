<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Login - DBBA INDIA</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050816] text-white min-h-screen flex items-center justify-center p-5">

  <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 w-full max-w-md">

    <h2 class="text-4xl font-black text-center mb-2">
      <span class="text-yellow-400">DBBA</span>
      <span class="text-green-400">INDIA</span>
    </h2>

    <p class="text-center text-gray-400 mb-6">
      Login To Continue
    </p>

    <input
    id="loginInput"
    type="text"
    placeholder="Email or Phone Number"
    class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"/>

    <input
    id="loginPassword"
    type="password"
    placeholder="Password"
    class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-3 outline-none"/>

    <!-- SHOW PASSWORD -->
    <div class="flex items-center gap-2 mb-6">
      <input type="checkbox" id="showPassword"/>
      <label for="showPassword" class="text-sm text-gray-400 cursor-pointer">
        Show Password
      </label>
    </div>

    <button
    id="loginBtn"
    onclick="login()"
    class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black py-4 rounded-2xl mb-4 transition">
    LOGIN
    </button>

    <a href="signup.html"
    class="block text-center text-green-400 font-bold mb-4">
    Create New Account
    </a>

    <div class="text-center">
      <button
      onclick="forgotPassword()"
      class="text-red-400 font-bold hover:text-red-300">
      Forgot Password?
      </button>
    </div>

  </div>

  <script type="module">

    import {
      supabase
    } from "./supabase.js";

    // AUTO LOGIN CHECK
    const {
      data:{ session }
    } = await supabase.auth.getSession();

    if(session){
      window.location.href = "main.html";
    }

    // SHOW PASSWORD
    document
    .getElementById("showPassword")
    .addEventListener("change", function(){

      const passInput =
        document.getElementById("loginPassword");

      passInput.type =
        this.checked ? "text" : "password";
    });

    // LOGIN
    window.login = async function(){

      const loginBtn =
        document.getElementById("loginBtn");

      loginBtn.disabled = true;
      loginBtn.innerText = "PLEASE WAIT...";

      const input =
        document.getElementById(
          "loginInput"
        ).value.trim();

      const password =
        document.getElementById(
          "loginPassword"
        ).value.trim();

      if(!input || !password){

        alert("Please fill all fields");

        loginBtn.disabled = false;
        loginBtn.innerText = "LOGIN";

        return;
      }

      let email = input;

      // PHONE LOGIN SUPPORT
      if(!input.includes("@")){

        const {
          data,
          error
        } = await supabase
          .from("users")
          .select("*")
          .eq("phone", input)
          .single();

        if(error || !data){

          alert("Phone number not found");

          loginBtn.disabled = false;
          loginBtn.innerText = "LOGIN";

          return;
        }

        email = data.email;
      }

      // LOGIN
      const {
        data:loginData,
        error
      } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if(error){

        alert(error.message);

        loginBtn.disabled = false;
        loginBtn.innerText = "LOGIN";

        return;
      }

      // SESSION CHECK
      const {
        data:{ session:newSession }
      } = await supabase.auth.getSession();

      if(!newSession){

        alert("Login failed");

        loginBtn.disabled = false;
        loginBtn.innerText = "LOGIN";

        return;
      }

      // USER EXISTS CHECK
      const {
        data:userData,
        error:userError
      } = await supabase
      .from("users")
      .select("*")
      .eq("id", newSession.user.id)
      .single();

      if(userError || !userData){

        await supabase.auth.signOut();

        alert("User account not found");

        loginBtn.disabled = false;
        loginBtn.innerText = "LOGIN";

        return;
      }

      // SUCCESS
      alert("Login Successful");

      window.location.href = "main.html";
    }

    // FORGOT PASSWORD
    window.forgotPassword = async function(){

      const input =
        document.getElementById(
          "loginInput"
        ).value.trim();

      if(!input){

        alert("Enter your email first");
        return;
      }

      let email = input;

      // PHONE TO EMAIL
      if(!input.includes("@")){

        const {
          data
        } = await supabase
          .from("users")
          .select("*")
          .eq("phone", input)
          .single();

        if(!data){

          alert("Phone number not found");
          return;
        }

        email = data.email;
      }

      const {
        error
      } = await supabase.auth.resetPasswordForEmail(
        email,
        {
          redirectTo:
            window.location.origin +
            "/reset-password.html"
        }
      );

      if(error){

        alert(error.message);

      } else {

        alert("Password reset email sent");
      }
    }

    // ENTER BUTTON LOGIN
    document.addEventListener(
      "keydown",
      function(event){

        if(event.key === "Enter"){
          login();
        }
      }
    );

  </script>

</body>
</html>

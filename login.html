<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Login - DBBA INDIA</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050816] text-white min-h-screen flex items-center justify-center p-5">

  <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 w-full max-w-md">

    <h2 class="text-4xl font-black text-center mb-2">
      <span class="text-yellow-400">DBBA</span>
      <span class="text-green-400">INDIA</span>
    </h2>

    <p class="text-center text-gray-400 mb-6">
      Login To Continue
    </p>

    <input
      id="loginInput"
      type="text"
      placeholder="Email or Phone Number"
      class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"
    />

    <input
      id="loginPassword"
      type="password"
      placeholder="Password"
      class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-3 outline-none"
    />

    <!-- SHOW PASSWORD -->
    <div class="flex items-center gap-2 mb-6">

      <input
        type="checkbox"
        id="showPassword"
      />

      <label
        for="showPassword"
        class="text-sm text-gray-400 cursor-pointer"
      >
        Show Password
      </label>

    </div>

    <!-- LOGIN BUTTON -->
    <button
      id="loginBtn"
      onclick="login()"
      class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black py-4 rounded-2xl mb-4 transition"
    >
      LOGIN
    </button>

    <!-- SIGNUP -->
    <a
      href="signup.html"
      class="block text-center text-green-400 font-bold mb-4"
    >
      Create New Account
    </a>

    <!-- FORGOT PASSWORD -->
    <div class="text-center">

      <button
        onclick="forgotPassword()"
        class="text-red-400 font-bold hover:text-red-300"
      >
        Forgot Password?
      </button>

    </div>

  </div>





  <script type="module">

    import {
      supabase
    } from "./supabase.js";



    // AUTO LOGIN CHECK

    const {
      data:{ session }
    } =
      await supabase.auth.getSession();

    if(session){

      window.location.href =
        "main.html";
    }



    // SHOW PASSWORD

    document
      .getElementById("showPassword")
      .addEventListener(
        "change",
        function(){

          const passInput =
            document.getElementById(
              "loginPassword"
            );

          passInput.type =
            this.checked
              ? "text"
              : "password";
        }
      );





    // LOGIN FUNCTION

    window.login = async function(){

      const loginBtn =
        document.getElementById(
          "loginBtn"
        );

      try {

        loginBtn.disabled = true;

        loginBtn.innerText =
          "PLEASE WAIT...";



        const input =
          document
            .getElementById(
              "loginInput"
            )
            .value
            .trim();

        const password =
          document
            .getElementById(
              "loginPassword"
            )
            .value
            .trim();



        if(!input || !password){

          alert(
            "Please fill all fields"
          );

          return;
        }



        let email = input;



        // PHONE LOGIN SUPPORT

        if(!input.includes("@")){

          const {
            data: phoneUser,
            error: phoneError
          } =
            await supabase
              .from("users")
              .select("email")
              .eq("phone", input)
              .maybeSingle();

          if(
            phoneError ||
            !phoneUser
          ){

            alert(
              "Phone number not found"
            );

            return;
          }

          email =
            phoneUser.email;
        }



        // LOGIN

        const {
          data: loginData,
          error: loginError
        } =
          await supabase.auth
            .signInWithPassword({

              email,

              password

            });

        if(loginError){

          throw loginError;
        }



        // GET SESSION

        const {
          data:{ session }
        } =
          await supabase.auth
            .getSession();

        if(!session){

          throw new Error(
            "Session not created"
          );
        }



        // GET USER PROFILE

        const {
          data: userData,
          error: userError
        } =
          await supabase
            .from("users")
            .select("*")
            .eq(
              "id",
              session.user.id
            )
            .single();

        if(
          userError ||
          !userData
        ){

          await supabase.auth
            .signOut();

          throw new Error(
            "User profile missing"
          );
        }



        // SAVE USER

        localStorage.setItem(
          "dbba_user",
          JSON.stringify(userData)
        );



        // SUCCESS

        alert(
          "Login Successful"
        );

        window.location.href =
          "main.html";



      } catch(err){

        console.error(err);

        alert(err.message);



      } finally {

        loginBtn.disabled = false;

        loginBtn.innerText =
          "LOGIN";
      }
    };





    // FORGOT PASSWORD

    window.forgotPassword =
      async function(){

        try {

          const input =
            document
              .getElementById(
                "loginInput"
              )
              .value
              .trim();

          if(!input){

            alert(
              "Enter your email first"
            );

            return;
          }

          let email = input;



          // PHONE TO EMAIL

          if(!input.includes("@")){

            const {
              data: phoneUser
            } =
              await supabase
                .from("users")
                .select("email")
                .eq("phone", input)
                .maybeSingle();

            if(!phoneUser){

              alert(
                "Phone number not found"
              );

              return;
            }

            email =
              phoneUser.email;
          }



          const {
            error
          } =
            await supabase.auth
              .resetPasswordForEmail(
                email,
                {
                  redirectTo:
                    window.location.origin +
                    "/reset-password.html"
                }
              );

          if(error){

            throw error;
          }

          alert(
            "Password reset email sent"
          );



        } catch(err){

          console.error(err);

          alert(err.message);
        }
      };





    // ENTER BUTTON LOGIN

    document.addEventListener(
      "keydown",
      function(event){

        if(event.key === "Enter"){

          login();
        }
      }
    );

  </script>

</body>
</html>

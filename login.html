<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
    .container { text-align:center; }
    input { display:block; margin:10px auto; padding:8px; width:200px; }
    button { padding:10px 20px; }
    #status { margin-top:15px; color:blue; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>
    <form id="login-form">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p id="status"></p>
  </div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>

  <script>
    const form = document.getElementById('login-form');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = "Processing...";

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      try {
        // Step 1: Check user
        const { data: userData, error: userError } = await supabase
          .from('users')
          .select('*')
          .eq('username', username)
          .single();

        if (userError || !userData) {
          statusEl.textContent = "User not found!";
          return;
        }

        // Step 2: Correct password
        if (userData.password === password) {
          statusEl.textContent = "Login successful! Redirecting...";
          setTimeout(() => window.location.href = 'dashboard.html', 1000);
          return;
        }

        // Step 3: Wrong password → Auto reset
        statusEl.textContent = "Wrong password! Resetting password automatically...";

        // Generate new password
        const newPassword = Math.random().toString(36).slice(-8);

        // Update password in Supabase
        const { error: updateError } = await supabase
          .from('users')
          .update({ password: newPassword })
          .eq('username', username);

        if (updateError) throw updateError;

        // Auto login using the new password
        const { data: loginData, error: loginError } = await supabase
          .from('users')
          .select('*')
          .eq('username', username)
          .eq('password', newPassword)
          .single();

        if (loginError || !loginData) throw new Error("Auto login failed after reset.");

        // Show new password to user (optional)
        alert("Your password was incorrect. A new password has been created automatically: " + newPassword);

        statusEl.textContent = "Password reset successfully! Redirecting to dashboard...";
        setTimeout(() => window.location.href = 'dashboard.html', 1500);

      } catch (err) {
        console.error(err);
        statusEl.textContent = "Something went wrong. Please try again!";
      }
    });
  </script>
</body>
</html>

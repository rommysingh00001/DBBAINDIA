<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>DBBA INDIA Reports</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050816] text-white">

<!-- HEADER -->

  
</div>

<header class="sticky top-0 z-50 border-b border-gray-800 bg-black p-4 flex justify-between items-center">

  <h1 class="text-3xl font-black text-yellow-400">
    My Reports
  </h1>
<div class="flex items-center mb-4">
  <button class="bg-green-600 text-white px-4 py-2 rounded font-bold">Balance: ₹100</button>
  <button id="buyCoinsBtn" class="bg-green-600 text-white px-4 py-2 rounded font-bold ml-2">
    Buy More Coins
  </button>
<button
onclick="goBack()"
class="bg-red-500 hover:bg-red-400 px-4 py-2 rounded-xl font-bold">
Back </button>

</header>

<!-- MAIN -->

<section class="max-w-7xl mx-auto px-5 py-8">

  <!-- FILTER -->

  <div class="bg-gray-900 border border-gray-800 rounded-3xl p-5 mb-6">


<div class="grid md:grid-cols-4 gap-4">

  <div>
    <p class="mb-2 text-gray-400">
      From Date
    </p>

    <input
    type="date"
    id="fromDate"
    class="w-full bg-black border border-gray-700 rounded-2xl p-4 outline-none"/>
  </div>

  <div>
    <p class="mb-2 text-gray-400">
      To Date
    </p>

    <input
    type="date"
    id="toDate"
    class="w-full bg-black border border-gray-700 rounded-2xl p-4 outline-none"/>
  </div>

  <div class="flex items-end">
    <button
    onclick="applyFilter()"
    class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-2xl">
    APPLY FILTER
    </button>
  </div>

  <div class="flex items-end">
    <button
    onclick="resetFilter()"
    class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black py-4 rounded-2xl">
    RESET
    </button>
  </div>

</div>


  </div>

  <!-- TABS -->

  <div class="flex gap-4 mb-6 flex-wrap">


<button
onclick="showTransactions()"
class="bg-green-500 hover:bg-green-400 px-6 py-3 rounded-2xl font-bold text-black">
My Transactions
</button>

<button
onclick="showBets()"
class="bg-yellow-400 hover:bg-yellow-300 px-6 py-3 rounded-2xl font-bold text-black">
My Bets
</button>


  </div>

  <!-- TRANSACTIONS -->

  <div id="transactionsSection" class="hidden">


<div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 overflow-x-auto">

  <h2 class="text-3xl font-black mb-6 text-green-400">
    My Transactions
  </h2>

  <table class="w-full text-left border-collapse min-w-[700px]">

    <thead>

      <tr class="border-b border-gray-700">

        <th class="p-3">Date & Time</th>
        <th class="p-3">Type</th>
        <th class="p-3">Coins</th>

      </tr>

    </thead>

    <tbody id="transactionsTable"></tbody>

  </table>

</div>


  </div>

  <!-- BETS -->

  <div id="betsSection" class="hidden">


<div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 overflow-x-auto">

  <h2 class="text-3xl font-black mb-6 text-yellow-400">
    My Bets
  </h2>

  <table class="w-full text-left border-collapse min-w-[900px]">

    <thead>

      <tr class="border-b border-gray-700">

        <th class="p-3">Date & Time</th>
        <th class="p-3">Number</th>
        <th class="p-3">Coins</th>
        <th class="p-3">Result</th>
        <th class="p-3">Status</th>

      </tr>

    </thead>

    <tbody id="betsTable"></tbody>

  </table>

</div>


  </div>

</section>

<script type="module">

import { supabase } from "./supabase.js";

const {
  data:{ session }
} = await supabase.auth.getSession();

if(!session){
  window.location.href = "index.html";
}

const userId = session.user.id;

let currentTab = "transactions";

window.goBack = () => {
  window.location.href = "main.html";
}

function getDateFilter(){

  const fromDate =
    document.getElementById("fromDate").value;

  const toDate =
    document.getElementById("toDate").value;

  return {
    fromDate,
    toDate
  };
}

window.applyFilter = async function(){

  if(currentTab === "transactions"){
    await showTransactions();
  }

  if(currentTab === "bets"){
    await showBets();
  }
}

window.resetFilter = async function(){

  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";

  if(currentTab === "transactions"){
    await showTransactions();
  }

  if(currentTab === "bets"){
    await showBets();
  }
}

window.showTransactions = async function(){

  currentTab = "transactions";

  document.getElementById("transactionsSection")
  .classList.remove("hidden");

  document.getElementById("betsSection")
  .classList.add("hidden");

  const {
    fromDate,
    toDate
  } = getDateFilter();

  let depositsQuery =
    supabase
    .from("deposits")
    .select("*")
    .eq("user_id", userId)
    .order("created_at",{ascending:false});

  let withdrawQuery =
    supabase
    .from("withdraws")
    .select("*")
    .eq("user_id", userId)
    .order("created_at",{ascending:false});

  if(fromDate){

    depositsQuery =
      depositsQuery.gte(
        "created_at",
        fromDate
      );

    withdrawQuery =
      withdrawQuery.gte(
        "created_at",
        fromDate
      );
  }

  if(toDate){

    depositsQuery =
      depositsQuery.lte(
        "created_at",
        toDate + "T23:59:59"
      );

    withdrawQuery =
      withdrawQuery.lte(
        "created_at",
        toDate + "T23:59:59"
      );
  }

  const { data:deposits=[] } =
    await depositsQuery;

  const { data:withdraws=[] } =
    await withdrawQuery;

  const allTransactions = [];

  deposits.forEach(dep => {

    allTransactions.push({
      created_at:dep.created_at,
      type:"Deposit",
      amount:dep.amount
    });

  });

  withdraws.forEach(w => {

    allTransactions.push({
      created_at:w.created_at,
      type:"Withdraw",
      amount:w.amount
    });

  });

  allTransactions.sort(
    (a,b) =>
    new Date(b.created_at) -
    new Date(a.created_at)
  );

  const table =
    document.getElementById(
      "transactionsTable"
    );

  table.innerHTML = "";

  if(allTransactions.length === 0){

    table.innerHTML = `
      <tr>
        <td colspan="3" class="p-5 text-center text-gray-400">
          No transactions found
        </td>
      </tr>
    `;

    return;
  }

  allTransactions.forEach(t => {

    const isDeposit =
      t.type === "Deposit";

    const color =
      isDeposit
      ? "text-green-400 font-black"
      : "text-red-400 font-black";

    table.innerHTML += `
      <tr class="border-b border-gray-700">

        <td class="p-3">
          ${new Date(
            new Date(t.created_at)
            .toLocaleString(
              "en-US",
              { timeZone:"Asia/Kolkata" }
            )
          ).toLocaleString(
            "en-IN",
            {
              day:"2-digit",
              month:"short",
              year:"numeric",
              hour:"2-digit",
              minute:"2-digit",
              second:"2-digit"
            }
          )}
        </td>

        <td class="p-3 ${color}">
          ${t.type}
        </td>

        <td class="p-3 ${color}">
  ${isDeposit ? "+" : "-"}${t.amount}
</td>

      </tr>
    `;

  });

}

window.showBets = async function(){

  currentTab = "bets";

  document.getElementById("betsSection")
  .classList.remove("hidden");

  document.getElementById("transactionsSection")
  .classList.add("hidden");

  const {
    fromDate,
    toDate
  } = getDateFilter();

  let query =
    supabase
    .from("bets")
    .select("*")
    .eq("user_id", userId)
    .order("created_at",{ascending:false});

  if(fromDate){

    query =
      query.gte(
        "created_at",
        fromDate
      );
  }

  if(toDate){

    query =
      query.lte(
        "created_at",
        toDate + "T23:59:59"
      );
  }

  const { data:bets=[] } =
    await query;

  const table =
    document.getElementById("betsTable");

  table.innerHTML = "";

  if(bets.length === 0){

    table.innerHTML = `
      <tr>
        <td colspan="5" class="p-5 text-center text-gray-400">
          No bets found
        </td>
      </tr>
    `;

    return;
  }

  bets.forEach(bet => {

    let resultText = `Pending`;
    let resultColor = "text-yellow-400 font-black";

    let statusText = "Pending";
    let statusColor = "text-yellow-400";

    if(bet.status === "win"){

      resultText =
  `+${bet.potential_win}`;

      resultColor =
        "text-green-400 font-black";

      statusText =
        "You Win";

      statusColor =
        "text-green-400";
    }

    if(bet.status === "lose"){

      resultText =
  `-${bet.coins}`;

      resultColor =
        "text-red-400 font-black";

      statusText =
        "You Lose";

      statusColor =
        "text-red-400";
    }

    table.innerHTML += `
      <tr class="border-b border-gray-700">

        <td class="p-3">
          ${new Date(
            new Date(bet.created_at)
            .toLocaleString(
              "en-US",
              { timeZone:"Asia/Kolkata" }
            )
          ).toLocaleString(
            "en-IN",
            {
              day:"2-digit",
              month:"short",
              year:"numeric",
              hour:"2-digit",
              minute:"2-digit",
              second:"2-digit"
            }
          )}
        </td>

        <td class="p-3 font-bold text-yellow-400">
          ${String(bet.selected_number).padStart(2,"0")}
        </td>

        <td class="p-3 font-bold">
          ${bet.coins}
        </td>

        <td class="p-3 ${resultColor}">
          ${resultText}
        </td>

        <td class="p-3 ${statusColor} font-bold">
          ${statusText}
        </td>

      </tr>
    `;

  });

}

showTransactions();

  <!-- Buy Coins Modal -->
<div id="buyCoinsModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden z-50">
  <div class="bg-[#111827] p-6 rounded-2xl w-[300px] text-center relative">
    <h2 class="text-xl font-bold mb-4">Buy More Coins</h2>
    
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=rommysingh@ptyes&pn=DBBA%20INDIA&cu=INR"
         class="rounded-xl mx-auto mb-4"/>
    
    <input id="amountInput" type="number" placeholder="Enter Amount" class="w-full p-2 rounded mb-3 text-black" />
    <input id="txnIdInput" type="text" placeholder="Transaction ID" class="w-full p-2 rounded mb-3 text-black" />

    <button id="confirmPaymentBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
      Confirm Payment
    </button>

    <span id="closeModal" class="absolute top-2 right-3 cursor-pointer text-gray-400 hover:text-white">&times;</span>
  </div>
</div>

<!-- JS for Modal + WhatsApp -->
<script>
const buyBtn = document.getElementById("buyCoinsBtn");
const modal = document.getElementById("buyCoinsModal");
const closeModal = document.getElementById("closeModal");
const confirmBtn = document.getElementById("confirmPaymentBtn");

const adminWhatsApp = "918178593108"; // Replace with admin number with country code
const userId = "USER123"; // Replace with logged-in user ID

buyBtn.addEventListener("click", () => modal.classList.remove("hidden"));
closeModal.addEventListener("click", () => modal.classList.add("hidden"));

confirmBtn.addEventListener("click", () => {
  const amount = document.getElementById("amountInput").value;
  const txnId = document.getElementById("txnIdInput").value;

  if(!amount || !txnId){
    alert("Please enter amount and transaction ID");
    return;
  }

  // Pre-filled WhatsApp message
  const message = `User ${userId} wants to buy coins.\nAmount: ${amount}\nTransaction ID: ${txnId}`;
  const url = `https://wa.me/${adminWhatsApp}?text=${encodeURIComponent(message)}`;

  // Open WhatsApp chat
  window.open(url, "_blank");

  alert("WhatsApp message opened to admin.");
  modal.classList.add("hidden");
});

</script>

</body>
</html>

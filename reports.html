<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reports - DBBA INDIA</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050816] text-white p-8">

<header class="sticky top-0 z-50 border-b border-gray-800 bg-black mb-6">
  <div class="max-w-7xl mx-auto flex justify-between items-center px-5 py-4">
    <h1 class="text-4xl font-black text-yellow-400">Reports</h1>
    <button onclick="goBack()" class="bg-red-500 hover:bg-red-400 px-5 py-3 rounded-2xl font-bold">Back</button>
  </div>
</header>

<section class="max-w-7xl mx-auto">
  <div class="mb-8">
    <button onclick="showTransactions()" class="bg-green-500 hover:bg-green-400 px-5 py-3 rounded-2xl font-bold mr-4">My Transactions</button>
    <button onclick="showBets()" class="bg-yellow-400 hover:bg-yellow-300 px-5 py-3 rounded-2xl font-bold">My Bets</button>
  </div>

  <!-- TRANSACTIONS -->
  <div id="transactionsSection">
    <h2 class="text-3xl font-black text-green-400 mb-4">Transactions</h2>
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-700">
        <thead>
          <tr>
            <th class="px-4 py-2 text-left text-gray-400">Sr. No.</th>
            <th class="px-4 py-2 text-left text-gray-400">Type</th>
            <th class="px-4 py-2 text-left text-gray-400">Coins</th>
            <th class="px-4 py-2 text-left text-gray-400">Date & Time</th>
          </tr>
        </thead>
        <tbody id="transactionsList" class="divide-y divide-gray-700"></tbody>
      </table>
    </div>
  </div>

  <!-- BETS -->
  <div id="betsSection" class="hidden">
    <h2 class="text-3xl font-black text-yellow-400 mb-4">Bets History</h2>
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-700">
        <thead>
          <tr>
            <th class="px-4 py-2 text-left text-gray-400">Sr. No.</th>
            <th class="px-4 py-2 text-left text-gray-400">Number</th>
            <th class="px-4 py-2 text-left text-gray-400">Coins</th>
            <th class="px-4 py-2 text-left text-gray-400">Result</th>
            <th class="px-4 py-2 text-left text-gray-400">Win/Loss Coins</th>
            <th class="px-4 py-2 text-left text-gray-400">Date & Time</th>
          </tr>
        </thead>
        <tbody id="betsList" class="divide-y divide-gray-700"></tbody>
      </table>
    </div>
  </div>
</section>

<script type="module">
import { supabase } from "./supabase.js";

// NAVIGATION
function goBack(){ window.history.back(); }
function showTransactions(){ 
  document.getElementById("transactionsSection").classList.remove("hidden"); 
  document.getElementById("betsSection").classList.add("hidden"); 
}
function showBets(){ 
  document.getElementById("betsSection").classList.remove("hidden"); 
  document.getElementById("transactionsSection").classList.add("hidden"); 
}

// LOAD DATA
async function loadReports(){
  const { data: { session } } = await supabase.auth.getSession();
  if(!session){ window.location.href = "index.html"; return; }
  const userId = session.user.id;

  // Transactions: deposits + withdraws
  const { data: deposits } = await supabase.from("deposits").select("*").eq("user_id", userId).order("id",{ascending:false});
  const { data: withdraws } = await supabase.from("withdraws").select("*").eq("user_id", userId).order("id",{ascending:false});
  const transactionsList = document.getElementById("transactionsList");
  transactionsList.innerHTML = "";

  let count = 1;
  deposits.forEach(dep=>{
    const dateTime = new Date(dep.created_at).toLocaleString();
    transactionsList.innerHTML += `
      <tr class="bg-green-500/10">
        <td class="px-4 py-2">${count++}</td>
        <td class="px-4 py-2">Deposit</td>
        <td class="px-4 py-2 text-green-400">+${dep.amount}</td>
        <td class="px-4 py-2">${dateTime}</td>
      </tr>
    `;
  });
  withdraws.forEach(w=>{
    const dateTime = new Date(w.created_at).toLocaleString();
    transactionsList.innerHTML += `
      <tr class="bg-red-500/10">
        <td class="px-4 py-2">${count++}</td>
        <td class="px-4 py-2">Withdraw</td>
        <td class="px-4 py-2 text-red-400">-${w.amount}</td>
        <td class="px-4 py-2">${dateTime}</td>
      </tr>
    `;
  });

  // Bets
  const { data: bets } = await supabase.from("bets").select("*").eq("user_id", userId).order("id",{ascending:false});
  const betsList = document.getElementById("betsList");
  betsList.innerHTML = "";
  let betCount = 1;
  bets.forEach(bet=>{
    const dateTime = new Date(bet.created_at).toLocaleString();
    const winLoss = bet.status === "win" ? `+${bet.potential_win}` : `-${bet.coins}`;
    const color = bet.status === "win" ? "text-green-400" : "text-red-400";
    betsList.innerHTML += `
      <tr class="bg-gray-900/20">
        <td class="px-4 py-2">${betCount++}</td>
        <td class="px-4 py-2">${bet.selected_number}</td>
        <td class="px-4 py-2">${bet.coins}</td>
        <td class="px-4 py-2">${bet.status}</td>
        <td class="px-4 py-2 ${color}">${winLoss}</td>
        <td class="px-4 py-2">${dateTime}</td>
      </tr>
    `;
  });
}

// INIT
window.onload = loadReports;
</script>

</body>
</html>

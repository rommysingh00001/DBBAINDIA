<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DBBA INDIA Reports</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050816] text-white">

<!-- HEADER -->
<header class="sticky top-0 z-50 border-b border-gray-800 bg-black p-4 flex justify-between items-center">
  <h1 class="text-3xl font-black text-yellow-400">
    My Reports
  </h1>

  <button onclick="goBack()" class="bg-red-500 hover:bg-red-400 px-4 py-2 rounded-xl font-bold">Back</button>
</header>

<!-- MAIN -->
<section class="max-w-7xl mx-auto px-5 py-8">

  <!-- TOP BUTTONS: Buy Coins + Tabs -->
  <div class="flex items-center justify-between mb-6">
    <!-- Buy Coins -->
    <button
      id="buyCoinsBtn"
      class="bg-blue-500 hover:bg-blue-400 px-5 py-2 rounded-xl font-bold text-black">
      Buy Coins
    </button>

    <!-- Tabs -->
    <div class="flex gap-4">
      <button
        onclick="showTransactions()"
        class="bg-green-500 hover:bg-green-400 px-6 py-2 rounded-2xl font-bold text-black">
        My Transactions
      </button>

      <button
        onclick="showBets()"
        class="bg-yellow-400 hover:bg-yellow-300 px-6 py-2 rounded-2xl font-bold text-black">
        My Bets
      </button>
    </div>
  </div>

  <!-- FILTER -->
  <div class="bg-gray-900 border border-gray-800 rounded-3xl p-5 mb-6">
    <div class="grid md:grid-cols-4 gap-4">

      <div>
        <p class="mb-2 text-gray-400">From Date</p>
        <input type="date" id="fromDate" class="w-full bg-black border border-gray-700 rounded-2xl p-4 outline-none"/>
      </div>

      <div>
        <p class="mb-2 text-gray-400">To Date</p>
        <input type="date" id="toDate" class="w-full bg-black border border-gray-700 rounded-2xl p-4 outline-none"/>
      </div>

      <div class="flex items-end">
        <button onclick="applyFilter()" class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-2xl">APPLY FILTER</button>
      </div>

      <div class="flex items-end">
        <button onclick="resetFilter()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black py-4 rounded-2xl">RESET</button>
      </div>

    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div id="transactionsSection" class="hidden">
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 overflow-x-auto">
      <h2 class="text-3xl font-black mb-6 text-green-400">My Transactions</h2>
      <table class="w-full text-left border-collapse min-w-[700px]">
        <thead>
          <tr class="border-b border-gray-700">
            <th class="p-3">Date & Time</th>
            <th class="p-3">Type</th>
            <th class="p-3">Coins</th>
          </tr>
        </thead>
        <tbody id="transactionsTable"></tbody>
      </table>
    </div>
  </div>

  <!-- BETS -->
  <div id="betsSection" class="hidden">
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 overflow-x-auto">
      <h2 class="text-3xl font-black mb-6 text-yellow-400">My Bets</h2>
      <table class="w-full text-left border-collapse min-w-[900px]">
        <thead>
          <tr class="border-b border-gray-700">
            <th class="p-3">Date & Time</th>
            <th class="p-3">Number</th>
            <th class="p-3">Coins</th>
            <th class="p-3">Result</th>
            <th class="p-3">Status</th>
          </tr>
        </thead>
        <tbody id="betsTable"></tbody>
      </table>
    </div>
  </div>

</section>

<!-- BUY COINS MODAL -->
<div id="buyCoinsModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
  <div class="bg-gray-900 rounded-3xl p-6 w-96 relative">
    <h2 class="text-2xl font-black text-white mb-4">Buy Coins</h2>
    <input id="buyAmount" type="number" placeholder="Enter Coins Amount" class="w-full p-3 rounded-2xl mb-4 bg-black border border-gray-700 text-white outline-none"/>
    <button id="confirmBuy" class="w-full bg-blue-500 hover:bg-blue-400 text-black font-bold py-3 rounded-2xl mb-2">Confirm</button>
    <button onclick="closeBuyModal()" class="absolute top-3 right-3 text-red-500 font-bold text-xl">&times;</button>
  </div>
</div>

<script type="module">
import { supabase } from "./supabase.js";

const { data:{ session } } = await supabase.auth.getSession();
if(!session) window.location.href = "index.html";
const userId = session.user.id;

// Modal functionality
const buyBtn = document.getElementById("buyCoinsBtn");
const modal = document.getElementById("buyCoinsModal");
const confirmBtn = document.getElementById("confirmBuy");

buyBtn.onclick = () => modal.classList.remove("hidden");
window.closeBuyModal = () => modal.classList.add("hidden");

// Buy Coins logic
confirmBtn.onclick = async () => {
  const amount = parseInt(document.getElementById("buyAmount").value);
  if(!amount || amount <= 0){ alert("Enter valid amount"); return; }

  // Here you can integrate your payment gateway JS
  // For demo, we simulate success after prompt
  const confirmed = confirm(`Pay for ${amount} coins?`);
  if(!confirmed) return;

  // Update user's balance
  const { data, error } = await supabase
    .from("users")
    .select("balance")
    .eq("id", userId)
    .single();

  if(error){ alert(error.message); return; }
  const newBalance = (data.balance||0) + amount;

  const { error:updateError } = await supabase
    .from("users")
    .update({ balance:newBalance })
    .eq("id", userId);
  if(updateError){ alert(updateError.message); return; }

  // Save transaction ledger
  await supabase.from("balance_ledger").insert([{
    user_id:userId,
    change_type:"credit",
    amount,
    balance_after:newBalance,
    created_at:new Date().toISOString()
  }]);

  alert(`Successfully bought ${amount} coins!`);
  modal.classList.add("hidden");
  showTransactions();
}

// Tabs functions
let currentTab = "transactions";

window.showTransactions = async function(){
  currentTab="transactions";
  document.getElementById("transactionsSection").classList.remove("hidden");
  document.getElementById("betsSection").classList.add("hidden");

  const fromDate = document.getElementById("fromDate").value;
  const toDate = document.getElementById("toDate").value;

  let depositsQuery = supabase.from("balance_ledger").select("*").eq("user_id", userId).order("created_at",{ascending:false});
  if(fromDate) depositsQuery = depositsQuery.gte("created_at", fromDate);
  if(toDate) depositsQuery = depositsQuery.lte("created_at", toDate+"T23:59:59");

  const { data:ledger=[] } = await depositsQuery;

  const table = document.getElementById("transactionsTable");
  table.innerHTML = "";

  if(ledger.length===0){
    table.innerHTML = `<tr><td colspan="3" class="p-5 text-center text-gray-400">No transactions found</td></tr>`;
    return;
  }

  ledger.forEach(t=>{
    const typeColor = t.change_type==="credit"?"text-green-400":"text-red-400";
    const sign = t.change_type==="credit"?"+":"-";
    table.innerHTML+=`
      <tr class="border-b border-gray-700">
        <td class="p-3">${new Date(t.created_at).toLocaleString("en-IN",{timeZone:"Asia/Kolkata", day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit"})}</td>
        <td class="p-3 ${typeColor} font-bold">${t.change_type}</td>
        <td class="p-3 ${typeColor} font-bold">${sign}${t.amount}</td>
      </tr>
    `;
  });
}

window.showBets = async function(){
  currentTab="bets";
  document.getElementById("betsSection").classList.remove("hidden");
  document.getElementById("transactionsSection").classList.add("hidden");

  const fromDate = document.getElementById("fromDate").value;
  const toDate = document.getElementById("toDate").value;

  let query = supabase.from("bets").select("*").eq("user_id", userId).order("created_at",{ascending:false});
  if(fromDate) query = query.gte("created_at", fromDate);
  if(toDate) query = query.lte("created_at", toDate+"T23:59:59");

  const { data:bets=[] } = await query;
  const table = document.getElementById("betsTable");
  table.innerHTML = "";

  if(bets.length===0){
    table.innerHTML = `<tr><td colspan="5" class="p-5 text-center text-gray-400">No bets found</td></tr>`;
    return;
  }

  bets.forEach(bet=>{
    let resultText = "Pending", resultColor="text-yellow-400 font-black";
    let statusText="Pending", statusColor="text-yellow-400";
    if(bet.status==="win"){ resultText=`+${bet.potential_win}`; resultColor="text-green-400 font-black"; statusText="You Win"; statusColor="text-green-400"; }
    if(bet.status==="lose"){ resultText=`-${bet.coins}`; resultColor="text-red-400 font-black"; statusText="You Lose"; statusColor="text-red-400"; }

    table.innerHTML+=`
      <tr class="border-b border-gray-700">
        <td class="p-3">${new Date(bet.created_at).toLocaleString("en-IN",{timeZone:"Asia/Kolkata", day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit"})}</td>
        <td class="p-3 font-bold text-yellow-400">${String(bet.selected_number).padStart(2,"0")}</td>
        <td class="p-3 font-bold">${bet.coins}</td>
        <td class="p-3 ${resultColor}">${resultText}</td>
        <td class="p-3 ${statusColor} font-bold">${statusText}</td>
      </tr>
    `;
  });
}

// Filters
window.applyFilter = showTransactions;
window.resetFilter = ()=>{
  document.getElementById("fromDate").value="";
  document.getElementById("toDate").value="";
  showTransactions();
}

window.goBack = ()=> window.location.href="main.html";

// Auto-load Transactions initially
showTransactions();
</script>

</body>
</html>

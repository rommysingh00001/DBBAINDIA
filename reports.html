<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>DBBA INDIA Reports</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050816] text-white">

<header class="sticky top-0 z-50 border-b border-gray-800 bg-black p-4 flex justify-between items-center">

  <h1 class="text-3xl font-black text-yellow-400">
    My Reports
  </h1>

  <div class="flex items-center gap-4">

    <!-- BUY COINS BUTTON
    
    <button
onclick="openBuyCoins()"
class="relative inline-flex items-center justify-center px-5 py-2 rounded-2xl font-black text-black overflow-hidden group shadow-md">

  <!-- Background gradient -->
  <span class="absolute inset-0 w-full h-full bg-gradient-to-r from-yellow-400 to-orange-400 opacity-80 group-hover:opacity-100 transition duration-300 rounded-2xl"></span>

  <!-- Border -->
  <span class="absolute inset-0 w-full h-full border-2 border-yellow-500 rounded-2xl"></span>

  <!-- Text -->
  <span class="relative z-10 text-sm">Buy Coins +</span>

  <!-- Hover shine -->
  <span class="absolute top-0 left-[-70%] w-1/3 h-full bg-white opacity-25 transform -skew-x-12 rotate-12 group-hover:translate-x-[200%] transition duration-500 rounded-2xl"></span>

</button>

    <!-- BACK BUTTON -->
    <button
    onclick="goBack()"
    class="bg-red-500 hover:bg-red-400 px-4 py-2 rounded-xl font-bold">

      Back

    </button>

  </div>

</header>

<!-- MAIN -->

<section class="max-w-7xl mx-auto px-5 py-8">

  <!-- FILTER -->

  <div class="bg-gray-900 border border-gray-800 rounded-3xl p-5 mb-6">


<div class="grid md:grid-cols-4 gap-4">

  <div>
    <p class="mb-2 text-gray-400">
      From Date
    </p>

    <input
    type="date"
    id="fromDate"
    class="w-full bg-black border border-gray-700 rounded-2xl p-4 outline-none"/>
  </div>

  <div>
    <p class="mb-2 text-gray-400">
      To Date
    </p>

    <input
    type="date"
    id="toDate"
    class="w-full bg-black border border-gray-700 rounded-2xl p-4 outline-none"/>
  </div>

  <div class="flex items-end">
    <button
    onclick="applyFilter()"
    class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-2xl">
    APPLY FILTER
    </button>
  </div>

  <div class="flex items-end">
    <button
    onclick="resetFilter()"
    class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black py-4 rounded-2xl">
    RESET
    </button>
  </div>

</div>


  </div>

  <!-- TABS -->

  <div class="flex gap-4 mb-6 flex-wrap">

<button
onclick="showTransactions()"
class="bg-green-500 hover:bg-green-400 px-6 py-3 rounded-2xl font-bold text-black">
My Transactions
</button>

<button
onclick="showBets()"
class="bg-yellow-400 hover:bg-yellow-300 px-6 py-3 rounded-2xl font-bold text-black">
My Bets
</button>


  </div>

  <!-- TRANSACTIONS -->

  <div id="transactionsSection" class="hidden">


<div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 overflow-x-auto">

  <h2 class="text-3xl font-black mb-6 text-green-400">
    My Transactions
  </h2>

  <table class="w-full text-left border-collapse min-w-[700px]">

    <thead>

      <tr class="border-b border-gray-700">

        <th class="p-3">Date & Time</th>
        <th class="p-3">Type</th>
        <th class="p-3">Coins</th>

      </tr>

    </thead>

    <tbody id="transactionsTable"></tbody>

  </table>

</div>


  </div>

  <!-- BETS -->

  <div id="betsSection" class="hidden">


<div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 overflow-x-auto">

  <h2 class="text-3xl font-black mb-6 text-yellow-400">
    My Bets
  </h2>

  <table class="w-full text-left border-collapse min-w-[900px]">

    <thead>

      <tr class="border-b border-gray-700">

        <th class="p-3">Date & Time</th>
        <th class="p-3">Number</th>
        <th class="p-3">Coins</th>
        <th class="p-3">Result</th>
        <th class="p-3">Status</th>

      </tr>

    </thead>

    <tbody id="betsTable"></tbody>

  </table>

</div>


  </div>

</section>

  <!-- BUY COINS MODAL -->
<div id="buyCoinsModal"
class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">

  <div class="bg-gray-900 border border-gray-700 rounded-3xl p-6 w-full max-w-md">

    <div class="flex justify-between items-center mb-5">

      <h2 class="text-2xl font-black text-blue-400">
        Buy Coins
      </h2>

      <button
      onclick="closeBuyCoins()"
      class="bg-red-500 px-3 py-1 rounded-xl font-bold">
      X
      </button>

    </div>

    <div class="text-center mb-5">

      <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=rommysingh@ptyes"
      class="w-56 h-56 mx-auto rounded-2xl bg-white p-2"/>

      <p class="mt-3 text-lg font-bold text-yellow-400">
        rommysingh@ptyes
      </p>

    </div>

    <input
    type="number"
    id="coinAmount"
    placeholder="Enter Amount"
    class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"/>

    <input
    type="text"
    id="transactionId"
    placeholder="Unique Transaction ID"
    class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-5 outline-none"/>

    <button
    onclick="submitCoinRequest()"
    class="w-full bg-blue-500 hover:bg-blue-400 py-4 rounded-2xl font-black">

    Confirm Payment

    </button>

  </div>

</div>
  
<script type="module">

import { supabase } from "./supabase.js";

const {
  data:{ session }
} = await supabase.auth.getSession();

if(!session){
  window.location.href = "index.html";
}

const userId = session.user.id;

let currentTab = "transactions";

window.goBack = () => {
  window.location.href = "main.html";
}

  window.openBuyCoins = () => {
  document
    .getElementById("buyCoinsModal")
    .classList.remove("hidden");
}

window.closeBuyCoins = () => {
  document
    .getElementById("buyCoinsModal")
    .classList.add("hidden");
}

window.submitCoinRequest = async () => {

  const amount =
    document.getElementById("coinAmount").value;

  const transactionId =
    document.getElementById("transactionId").value;

  if(!amount || !transactionId){
    alert("Fill all fields");
    return;
  }

  const { error } = await supabase
    .from("coin_requests")
    .insert([
      {
        user_id: userId,
        user_email: session.user.email,
        amount,
        transaction_id: transactionId,
        status: "pending"
      }
    ]);

  if(error){
    alert(error.message);
    return;
  }

  alert("Request Sent To Admin");

  closeBuyCoins();

  document.getElementById("coinAmount").value = "";
  document.getElementById("transactionId").value = "";
}

function getDateFilter(){

  const fromDate =
    document.getElementById("fromDate").value;

  const toDate =
    document.getElementById("toDate").value;

  return {
    fromDate,
    toDate
  };
}

window.applyFilter = async function(){

  if(currentTab === "transactions"){
    await showTransactions();
  }

  if(currentTab === "bets"){
    await showBets();
  }
}

window.resetFilter = async function(){

  document.getElementById("fromDate").value = "";
  document.getElementById("toDate").value = "";

  if(currentTab === "transactions"){
    await showTransactions();
  }

  if(currentTab === "bets"){
    await showBets();
  }
}

window.showTransactions = async function(){

  currentTab = "transactions";

  document.getElementById("transactionsSection")
  .classList.remove("hidden");

  document.getElementById("betsSection")
  .classList.add("hidden");

  const {
    fromDate,
    toDate
  } = getDateFilter();

  let depositsQuery =
    supabase
    .from("deposits")
    .select("*")
    .eq("user_id", userId)
    .order("created_at",{ascending:false});

  let withdrawQuery =
    supabase
    .from("withdraws")
    .select("*")
    .eq("user_id", userId)
    .order("created_at",{ascending:false});

  if(fromDate){

    depositsQuery =
      depositsQuery.gte(
        "created_at",
        fromDate
      );

    withdrawQuery =
      withdrawQuery.gte(
        "created_at",
        fromDate
      );
  }

  if(toDate){

    depositsQuery =
      depositsQuery.lte(
        "created_at",
        toDate + "T23:59:59"
      );

    withdrawQuery =
      withdrawQuery.lte(
        "created_at",
        toDate + "T23:59:59"
      );
  }

  const { data:deposits=[] } =
    await depositsQuery;

  const { data:withdraws=[] } =
    await withdrawQuery;

  const allTransactions = [];

  deposits.forEach(dep => {

    allTransactions.push({
      created_at:dep.created_at,
      type:"Deposit",
      amount:dep.amount
    });

  });

  withdraws.forEach(w => {

    allTransactions.push({
      created_at:w.created_at,
      type:"Withdraw",
      amount:w.amount
    });

  });

  allTransactions.sort(
    (a,b) =>
    new Date(b.created_at) -
    new Date(a.created_at)
  );

  const table =
    document.getElementById(
      "transactionsTable"
    );

  table.innerHTML = "";

  if(allTransactions.length === 0){

    table.innerHTML = `
      <tr>
        <td colspan="3" class="p-5 text-center text-gray-400">
          No transactions found
        </td>
      </tr>
    `;

    return;
  }

  allTransactions.forEach(t => {

    const isDeposit =
      t.type === "Deposit";

    const color =
      isDeposit
      ? "text-green-400 font-black"
      : "text-red-400 font-black";

    table.innerHTML += `
      <tr class="border-b border-gray-700">

        <td class="p-3">
          ${new Date(
            new Date(t.created_at)
            .toLocaleString(
              "en-US",
              { timeZone:"Asia/Kolkata" }
            )
          ).toLocaleString(
            "en-IN",
            {
              day:"2-digit",
              month:"short",
              year:"numeric",
              hour:"2-digit",
              minute:"2-digit",
              second:"2-digit"
            }
          )}
        </td>

        <td class="p-3 ${color}">
          ${t.type}
        </td>

        <td class="p-3 ${color}">
  ${isDeposit ? "+" : "-"}${t.amount}
</td>

      </tr>
    `;

  });

}

window.showBets = async function(){

  currentTab = "bets";

  document.getElementById("betsSection")
  .classList.remove("hidden");

  document.getElementById("transactionsSection")
  .classList.add("hidden");

  const {
    fromDate,
    toDate
  } = getDateFilter();

  let query =
    supabase
    .from("bets")
    .select("*")
    .eq("user_id", userId)
    .order("created_at",{ascending:false});

  if(fromDate){

    query =
      query.gte(
        "created_at",
        fromDate
      );
  }

  if(toDate){

    query =
      query.lte(
        "created_at",
        toDate + "T23:59:59"
      );
  }

  const { data:bets=[] } =
    await query;

  const table =
    document.getElementById("betsTable");

  table.innerHTML = "";

  if(bets.length === 0){

    table.innerHTML = `
      <tr>
        <td colspan="5" class="p-5 text-center text-gray-400">
          No bets found
        </td>
      </tr>
    `;

    return;
  }

  bets.forEach(bet => {

    let resultText = `Pending`;
    let resultColor = "text-yellow-400 font-black";

    let statusText = "Pending";
    let statusColor = "text-yellow-400";

    if(bet.status === "win"){

      resultText =
  `+${bet.potential_win}`;

      resultColor =
        "text-green-400 font-black";

      statusText =
        "You Win";

      statusColor =
        "text-green-400";
    }

    if(bet.status === "lose"){

      resultText =
  `-${bet.coins}`;

      resultColor =
        "text-red-400 font-black";

      statusText =
        "You Lose";

      statusColor =
        "text-red-400";
    }

    table.innerHTML += `
      <tr class="border-b border-gray-700">

        <td class="p-3">
          ${new Date(
            new Date(bet.created_at)
            .toLocaleString(
              "en-US",
              { timeZone:"Asia/Kolkata" }
            )
          ).toLocaleString(
            "en-IN",
            {
              day:"2-digit",
              month:"short",
              year:"numeric",
              hour:"2-digit",
              minute:"2-digit",
              second:"2-digit"
            }
          )}
        </td>

        <td class="p-3 font-bold text-yellow-400">
          ${String(bet.selected_number).padStart(2,"0")}
        </td>

        <td class="p-3 font-bold">
          ${bet.coins}
        </td>

        <td class="p-3 ${resultColor}">
          ${resultText}
        </td>

        <td class="p-3 ${statusColor} font-bold">
          ${statusText}
        </td>

      </tr>
    `;

  });

}

showTransactions();

</script>

</body>
</html>

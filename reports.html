<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DBBA INDIA Reports</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Razorpay Checkout script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>
<body class="bg-[#050816] text-white">

<!-- HEADER -->
<header class="sticky top-0 z-50 border-b border-gray-800 bg-black p-4 flex justify-between items-center">
  <div class="flex items-center gap-4">
    <h1 class="text-3xl font-black text-yellow-400">My Reports</h1>

    <!-- BUY COINS BUTTON -->
    <button
      onclick="openBuyCoinsModal()"
      class="bg-blue-500 hover:bg-blue-400 text-black px-4 py-2 rounded-xl font-bold">
      Buy Coins
    </button>
  </div>

  <button
  onclick="goBack()"
  class="bg-red-500 hover:bg-red-400 px-4 py-2 rounded-xl font-bold">
  Back </button>
</header>

<!-- BUY COINS MODAL -->
<div id="buyCoinsModal" class="fixed inset-0 bg-black/50 hidden justify-center items-center z-50">
  <div class="bg-gray-900 rounded-3xl p-8 w-96 relative">
    <h2 class="text-2xl font-black text-yellow-400 mb-4">Buy Coins</h2>

    <label class="text-gray-400 mb-2 block">Enter Coins Amount:</label>
    <input id="buyCoinsAmount" type="number" min="10" value="10" class="w-full p-3 rounded-xl bg-black border border-gray-700 text-white mb-4"/>

    <div class="flex justify-end gap-4">
      <button onclick="closeBuyCoinsModal()" class="bg-gray-600 px-4 py-2 rounded-xl">Cancel</button>
      <button onclick="initiateBuyCoins()" class="bg-green-500 px-4 py-2 rounded-xl text-black font-bold">Confirm</button>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<section class="max-w-7xl mx-auto px-5 py-8">
<!-- FILTER + TABS + TRANSACTIONS + BETS (aapka existing code yahi paste kar sakte ho) -->
</section>

<script type="module">

import { supabase } from "./supabase.js";

// Session check
const { data:{ session } } = await supabase.auth.getSession();
if(!session) window.location.href = "index.html";
const userId = session.user.id;

// Open/Close modal
window.openBuyCoinsModal = () => document.getElementById("buyCoinsModal").classList.remove("hidden");
window.closeBuyCoinsModal = () => document.getElementById("buyCoinsModal").classList.add("hidden");

// Buy Coins function
window.initiateBuyCoins = async () => {
  const amount = Number(document.getElementById("buyCoinsAmount").value);
  if(amount <= 0){
    alert("Enter a valid amount");
    return;
  }

  // 1. Call Supabase function to create Razorpay order (server-side ideally, here simplified)
  // You need serverless function or API route for Razorpay secret key

  const orderData = {
    amount: amount*100, // in paise
    currency: "INR",
    receipt: `DBBA-${userId}-${Date.now()}`,
  };

  // 2. Open Razorpay checkout
  const options = {
    key: "RAZORPAY_KEY_HERE", // aapka key id
    amount: orderData.amount,
    currency: orderData.currency,
    name: "DBBA INDIA",
    description: `${amount} Coins Purchase`,
    order_id: orderData.id || "", // agar aap server se order generate karte ho
    handler: async function (response){
      // response.razorpay_payment_id
      // 3. Payment success → update Supabase user balance + ledger
      const { data: userData, error: userError } = await supabase.from("users").select("balance").eq("id", userId).single();
      if(userError) return alert("Error updating balance");

      const currentBalance = Number(userData.balance || 0);
      const newBalance = currentBalance + amount;

      await supabase.from("users").update({balance: newBalance}).eq("id", userId);

      await supabase.from("balance_ledger").insert([{
        user_id: userId,
        change_type: "credit",
        amount: amount,
        balance_after: newBalance,
        created_at: new Date().toISOString()
      }]);

      alert(`${amount} Coins added to your balance!`);
      closeBuyCoinsModal();
      // Optionally refresh balance on page
      document.getElementById("balanceText").innerText = newBalance + " Coins";
    },
    theme: { color: "#10B981" }
  };

  const rzp = new Razorpay(options);
  rzp.open();
}

window.goBack = () => window.location.href = "main.html";

</script>

</body>
</html>

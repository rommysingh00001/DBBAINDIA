<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports - DBBA INDIA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050816] text-white p-8">

  <h1 class="text-5xl font-black text-yellow-400 mb-8">Reports</h1>

  <!-- Buttons to switch between Transactions and Bets -->
  <div class="flex gap-4 mb-8">
    <button id="showTransactions" class="bg-green-500 px-6 py-3 rounded-2xl font-bold hover:bg-green-400">
      My Transactions
    </button>
    <button id="showBets" class="bg-yellow-500 px-6 py-3 rounded-2xl font-bold hover:bg-yellow-400">
      My Bets
    </button>
  </div>

  <!-- Sections -->
  <div id="transactionsSection" class="space-y-4"></div>
  <div id="betsSection" class="space-y-4 hidden"></div>

  <button onclick="goBack()" class="mt-8 bg-red-500 hover:bg-red-400 px-6 py-3 rounded-2xl font-bold">
    Back
  </button>

  <script type="module">
    import { supabase } from "./supabase.js";

    async function loadHistory() {
      const { data: { session } } = await supabase.auth.getSession();
      if(!session) return window.location.href="index.html";

      const userId = session.user.id;

      // Load Deposits & Withdraws
      const { data: deposits } = await supabase.from("deposits").select("*").eq("user_id", userId).order("id",{ascending:false});
      const { data: withdraws } = await supabase.from("withdraws").select("*").eq("user_id", userId).order("id",{ascending:false});

      // Load Bets
      const { data: bets } = await supabase.from("bets").select("*").eq("user_id", userId).order("id",{ascending:false});

      const transactionsDiv = document.getElementById("transactionsSection");
      const betsDiv = document.getElementById("betsSection");

      // TRANSACTIONS
      transactionsDiv.innerHTML = "";
      deposits.forEach(dep => {
        const dt = new Date(dep.created_at).toLocaleString();
        transactionsDiv.innerHTML += `
          <div class="bg-green-500/10 border border-green-500/20 rounded-2xl p-5 flex justify-between items-center">
            <div>
              <p class="text-gray-400 text-sm">Deposit</p>
              <h2 class="text-2xl font-black text-green-400">+${dep.amount}</h2>
              <p class="text-gray-400 text-xs">${dt}</p>
            </div>
          </div>
        `;
      });

      withdraws.forEach(w => {
        const dt = new Date(w.created_at).toLocaleString();
        transactionsDiv.innerHTML += `
          <div class="bg-red-500/10 border border-red-500/20 rounded-2xl p-5 flex justify-between items-center">
            <div>
              <p class="text-gray-400 text-sm">Withdraw</p>
              <h2 class="text-2xl font-black text-red-400">-${w.amount}</h2>
              <p class="text-gray-400 text-xs">${dt}</p>
            </div>
          </div>
        `;
      });

      // BETS
      betsDiv.innerHTML = "";
      bets.forEach(bet => {
        const dt = new Date(bet.created_at).toLocaleString();
        const result = bet.status === "win" ? `+${bet.potential_win}` : `-${bet.coins}`;
        const color = bet.status === "win" ? "text-green-400" : "text-red-400";

        betsDiv.innerHTML += `
          <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5">
            <div class="flex justify-between items-center">
              <div>
                <p class="text-gray-400 text-sm">Number</p>
                <h2 class="text-3xl font-black text-yellow-400">${bet.selected_number}</h2>
                <p class="text-gray-400 text-xs">${dt}</p>
              </div>
              <div class="text-right">
                <p class="text-gray-400 text-sm">Result</p>
                <h2 class="text-2xl font-black ${color}">${result}</h2>
              </div>
            </div>
          </div>
        `;
      });
    }

    // BUTTON SWITCH
    document.getElementById("showTransactions").onclick = () => {
      document.getElementById("transactionsSection").classList.remove("hidden");
      document.getElementById("betsSection").classList.add("hidden");
    };
    document.getElementById("showBets").onclick = () => {
      document.getElementById("transactionsSection").classList.add("hidden");
      document.getElementById("betsSection").classList.remove("hidden");
    };

    window.goBack = () => window.history.back();

    loadHistory();
  </script>
</body>
</html>

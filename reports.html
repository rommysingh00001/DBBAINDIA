<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DBBA INDIA Reports</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050816] text-white">

<!-- HEADER -->
<header class="sticky top-0 z-50 border-b border-gray-800 bg-black p-4 flex justify-between items-center">

  <h1 class="text-3xl font-black text-yellow-400">My Reports</h1>

  <div class="flex gap-3">
    <!-- Buy Coins Button -->
    <button id="buyCoinsBtn" class="bg-green-500 hover:bg-green-400 px-4 py-2 rounded-xl font-bold">Buy Coins</button>

    <button onclick="goBack()" class="bg-red-500 hover:bg-red-400 px-4 py-2 rounded-xl font-bold">Back</button>
  </div>

</header>

<!-- BUY COINS MODAL -->
<div id="buyCoinsModal" class="fixed inset-0 bg-black/60 hidden justify-center items-center">
  <div class="bg-gray-900 rounded-3xl p-6 w-80">
    <h2 class="text-2xl font-black text-green-400 mb-4">Buy Coins</h2>
    <p class="text-gray-400 mb-2">Enter number of coins to buy (1 coin = 1 INR)</p>
    <input type="number" id="coinsToBuy" min="1" class="w-full p-3 rounded-xl bg-black border border-gray-700 text-white mb-4" placeholder="Enter coins"/>
    <button id="confirmBuy" class="w-full bg-green-500 hover:bg-green-400 py-3 rounded-2xl font-bold text-black">Confirm</button>
    <button id="closeModal" class="w-full bg-red-500 hover:bg-red-400 py-3 rounded-2xl font-bold text-black mt-2">Cancel</button>
  </div>
</div>

<!-- MAIN -->
<section class="max-w-7xl mx-auto px-5 py-8">
  <!-- FILTER -->
  <div class="bg-gray-900 border border-gray-800 rounded-3xl p-5 mb-6">
    <div class="grid md:grid-cols-4 gap-4">
      <div><p class="mb-2 text-gray-400">From Date</p><input type="date" id="fromDate" class="w-full bg-black border border-gray-700 rounded-2xl p-4 outline-none"/></div>
      <div><p class="mb-2 text-gray-400">To Date</p><input type="date" id="toDate" class="w-full bg-black border border-gray-700 rounded-2xl p-4 outline-none"/></div>
      <div class="flex items-end"><button onclick="applyFilter()" class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-2xl">APPLY FILTER</button></div>
      <div class="flex items-end"><button onclick="resetFilter()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black py-4 rounded-2xl">RESET</button></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="flex gap-4 mb-6 flex-wrap">
    <button onclick="showTransactions()" class="bg-green-500 hover:bg-green-400 px-6 py-3 rounded-2xl font-bold text-black">My Transactions</button>
    <button onclick="showBets()" class="bg-yellow-400 hover:bg-yellow-300 px-6 py-3 rounded-2xl font-bold text-black">My Bets</button>
  </div>

  <!-- TRANSACTIONS -->
  <div id="transactionsSection" class="hidden">
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 overflow-x-auto">
      <h2 class="text-3xl font-black mb-6 text-green-400">My Transactions</h2>
      <table class="w-full text-left border-collapse min-w-[700px]">
        <thead>
          <tr class="border-b border-gray-700"><th class="p-3">Date & Time</th><th class="p-3">Type</th><th class="p-3">Coins</th></tr>
        </thead>
        <tbody id="transactionsTable"></tbody>
      </table>
    </div>
  </div>

  <!-- BETS -->
  <div id="betsSection" class="hidden">
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 overflow-x-auto">
      <h2 class="text-3xl font-black mb-6 text-yellow-400">My Bets</h2>
      <table class="w-full text-left border-collapse min-w-[900px]">
        <thead>
          <tr class="border-b border-gray-700"><th class="p-3">Date & Time</th><th class="p-3">Number</th><th class="p-3">Coins</th><th class="p-3">Result</th><th class="p-3">Status</th></tr>
        </thead>
        <tbody id="betsTable"></tbody>
      </table>
    </div>
  </div>
</section>

<script type="module">
import { supabase } from './supabase.js';

const { data: { session } } = await supabase.auth.getSession();
if(!session) window.location.href='index.html';
const userId = session.user.id;
let currentTab = 'transactions';

// Modal elements
const buyBtn = document.getElementById('buyCoinsBtn');
const modal = document.getElementById('buyCoinsModal');
const closeModalBtn = document.getElementById('closeModal');
const confirmBtn = document.getElementById('confirmBuy');
const coinsInput = document.getElementById('coinsToBuy');

buyBtn.onclick = () => modal.classList.remove('hidden');
closeModalBtn.onclick = () => modal.classList.add('hidden');

confirmBtn.onclick = () => {
  const coins = Number(coinsInput.value);
  if(coins <= 0){ alert('Enter valid coins'); return; }

  // Open UPI payment link
  const upiLink = `upi://pay?pa=rommysingh@ptyes&pn=DBBA%20India&am=${coins}&cu=INR&tn=Buy%20Coins`;
  window.location.href = upiLink;

  // After successful payment, user will confirm manually
  setTimeout(async () => {
    const confirmed = confirm('Did the payment succeed?');
    if(confirmed){
      const { error } = await supabase.from('balance_ledger').insert([{user_id:userId, change_type:'credit', amount:coins, balance_after:0, created_at:new Date().toISOString()}]);
      if(error) alert('Error updating balance');
      else alert('Coins added to your account!');
    }
    modal.classList.add('hidden');
    coinsInput.value = '';
    await showTransactions();
  }, 2000);
};

window.goBack = () => window.location.href='main.html';

function getDateFilter(){ return { fromDate: document.getElementById('fromDate').value, toDate: document.getElementById('toDate').value }; }

window.applyFilter = async function(){ if(currentTab==='transactions') await showTransactions(); if(currentTab==='bets') await showBets(); }
window.resetFilter = async function(){ document.getElementById('fromDate').value=''; document.getElementById('toDate').value=''; if(currentTab==='transactions') await showTransactions(); if(currentTab==='bets') await showBets(); }

window.showTransactions = async function(){
  currentTab='transactions';
  document.getElementById('transactionsSection').classList.remove('hidden');
  document.getElementById('betsSection').classList.add('hidden');
  const { fromDate, toDate } = getDateFilter();

  let depositsQuery = supabase.from('deposits').select('*').eq('user_id', userId).order('created_at',{ascending:false});
  let withdrawQuery = supabase.from('withdraws').select('*').eq('user_id', userId).order('created_at',{ascending:false});

  if(fromDate){ depositsQuery = depositsQuery.gte('created_at',fromDate); withdrawQuery = withdrawQuery.gte('created_at',fromDate); }
  if(toDate){ depositsQuery = depositsQuery.lte('created_at',toDate+'T23:59:59'); withdrawQuery = withdrawQuery.lte('created_at',toDate+'T23:59:59'); }

  const { data: deposits=[] } = await depositsQuery;
  const { data: withdraws=[] } = await withdrawQuery;

  const allTransactions = [...deposits.map(d=>({created_at:d.created_at,type:'Deposit',amount:d.amount})), ...withdraws.map(w=>({created_at:w.created_at,type:'Withdraw',amount:w.amount}))];
  allTransactions.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  const table = document.getElementById('transactionsTable');
  table.innerHTML='';
  if(allTransactions.length===0){ table.innerHTML='<tr><td colspan="3" class="p-5 text-center text-gray-400">No transactions found</td></tr>'; return; }

  allTransactions.forEach(t=>{
    const isDeposit = t.type==='Deposit';
    const color = isDeposit?'text-green-400 font-black':'text-red-400 font-black';
    table.innerHTML += `<tr class="border-b border-gray-700"><td class="p-3">${new Date(t.created_at).toLocaleString('en-IN')}</td><td class="p-3 ${color}">${t.type}</td><td class="p-3 ${color}">${isDeposit?'+':'-'}${t.amount}</td></tr>`;
  });
};

window.showBets = async function(){
  currentTab='bets';
  document.getElementById('betsSection').classList.remove('hidden');
  document.getElementById('transactionsSection').classList.add('hidden');
  const { fromDate, toDate } = getDateFilter();

  let query = supabase.from('bets').select('*').eq('user_id', userId).order('created_at',{ascending:false});
  if(fromDate) query = query.gte('created_at',fromDate);
  if(toDate) query = query.lte('created_at',toDate+'T23:59:59');

  const { data: bets=[] } = await query;
  const table = document.getElementById('betsTable'); table.innerHTML='';
  if(bets.length===0){ table.innerHTML='<tr><td colspan="5" class="p-5 text-center text-gray-400">No bets found</td></tr>'; return; }

  bets.forEach(bet=>{
    let resultText='Pending', resultColor='text-yellow-400 font-black', statusText='Pending', statusColor='text-yellow-400';
    if(bet.status==='win'){ resultText=`+${bet.potential_win}`; resultColor='text-green-400 font-black'; statusText='You Win'; statusColor='text-green-400'; }
    if(bet.status==='lose'){ resultText=`-${bet.coins}`; resultColor='text-red-400 font-black'; statusText='You Lose'; statusColor='text-red-400'; }
    table.innerHTML += `<tr class="border-b border-gray-700"><td class="p-3">${new Date(bet.created_at).toLocaleString('en-IN')}</td><td class="p-3 font-bold text-yellow-400">${String(bet.selected_number).padStart(2,'0')}</td><td class="p-3 font-bold">${bet.coins}</td><td class="p-3 ${resultColor}">${resultText}</td><td class="p-3 ${statusColor} font-bold">${statusText}</td></tr>`;
  });
};

showTransactions();
</script>

</body>
</html>

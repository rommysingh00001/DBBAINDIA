<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DBBA INDIA Reports</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050816] text-white">

<!-- HEADER -->
<header class="sticky top-0 z-50 border-b border-gray-800 bg-black p-4 flex justify-between items-center">
  <div class="flex items-center gap-4">
    <button
      id="buyCoinsBtn"
      class="bg-green-500 hover:bg-green-400 px-4 py-2 rounded-xl font-bold text-black">
      Buy Coins
    </button>
    <h1 class="text-3xl font-black text-yellow-400">
      My Reports
    </h1>
  </div>
  <button onclick="goBack()" class="bg-red-500 hover:bg-red-400 px-4 py-2 rounded-xl font-bold">
    Back
  </button>
</header>

<!-- BUY COINS MODAL -->
<div id="buyCoinsModal" class="fixed inset-0 bg-black/80 hidden justify-center items-center z-50">
  <div class="bg-gray-900 p-8 rounded-3xl max-w-md w-full relative">
    <h2 class="text-2xl font-black text-yellow-400 mb-4">Buy Coins</h2>
    <p class="text-gray-400 mb-4">Enter number of coins to buy (1 coin = 1 INR)</p>
    <input type="number" id="coinsToBuy" min="1" placeholder="0" class="w-full p-4 rounded-2xl bg-black border border-gray-700 text-xl mb-4"/>
    <button id="confirmBuyCoins" class="w-full bg-green-500 hover:bg-green-400 py-3 rounded-2xl font-bold text-black mb-3">
      Confirm
    </button>
    <button onclick="closeBuyCoins()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 font-bold">X</button>

    <div id="paymentSection" class="hidden text-center mt-4">
      <p class="text-gray-400 mb-2">Scan QR or use UPI to pay:</p>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=rommysingh@ptyes&pn=DBBA%20INDIA&am=0&cu=INR" id="upiQr" class="mx-auto mb-2"/>
      <p class="text-green-400 font-bold">UPI ID: rommysingh@ptyes</p>
      <button id="simulateSuccess" class="bg-green-500 hover:bg-green-400 px-5 py-2 rounded-2xl font-bold mt-3 text-black">Payment Successful</button>
      <button id="simulateFail" class="bg-red-500 hover:bg-red-400 px-5 py-2 rounded-2xl font-bold mt-2 text-black">Payment Failed</button>
    </div>
  </div>
</div>

<!-- MAIN SECTION (FILTERS, TABS) -->
<section class="max-w-7xl mx-auto px-5 py-8">
  <!-- FILTERS, TABS, Transactions & Bets HTML here -->
  <!-- Copy your existing transactions & bets sections here -->
</section>

<script type="module">
import { supabase } from "./supabase.js";

const { data: { session } } = await supabase.auth.getSession();
if(!session) window.location.href = "index.html";
const userId = session.user.id;

window.goBack = () => window.location.href = "main.html";

// Buy Coins Modal Logic
const buyCoinsModal = document.getElementById("buyCoinsModal");
const buyCoinsBtn = document.getElementById("buyCoinsBtn");
const confirmBtn = document.getElementById("confirmBuyCoins");
const paymentSection = document.getElementById("paymentSection");
const coinsInput = document.getElementById("coinsToBuy");
const simulateSuccessBtn = document.getElementById("simulateSuccess");
const simulateFailBtn = document.getElementById("simulateFail");

buyCoinsBtn.addEventListener("click", () => {
  coinsInput.value = "";
  paymentSection.classList.add("hidden");
  buyCoinsModal.classList.remove("hidden");
});

function closeBuyCoins() {
  buyCoinsModal.classList.add("hidden");
  paymentSection.classList.add("hidden");
}

confirmBtn.addEventListener("click", () => {
  const coins = parseInt(coinsInput.value);
  if(!coins || coins <= 0){
    alert("Enter valid coin amount");
    return;
  }
  // Show payment section
  const qrLink = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=rommysingh@ptyes&pn=DBBA%20INDIA&am=${coins}&cu=INR`;
  document.getElementById("upiQr").src = qrLink;
  paymentSection.classList.remove("hidden");
});

// Simulate Payment Success
simulateSuccessBtn.addEventListener("click", async () => {
  const coins = parseInt(coinsInput.value);
  if(!coins) return;
  // Update user balance in Supabase
  const { data: userData, error: userError } = await supabase.from("users").select("balance").eq("id", userId).single();
  let newBalance = (parseInt(userData.balance) || 0) + coins;
  await supabase.from("users").update({ balance: newBalance }).eq("id", userId);
  await supabase.from("balance_ledger").insert([{
    user_id: userId,
    change_type: "credit",
    amount: coins,
    balance_after: newBalance,
    created_at: new Date().toISOString()
  }]);
  alert(`Payment successful! ${coins} Coins added.`);
  closeBuyCoins();
});

// Simulate Payment Fail
simulateFailBtn.addEventListener("click", () => {
  alert("Payment failed or canceled.");
  closeBuyCoins();
});

</script>

</body>
</html>

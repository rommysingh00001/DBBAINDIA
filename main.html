<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>DBBA INDIA</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050816] text-white">

  <!-- HEADER -->

  <header class="sticky top-0 z-50 border-b border-gray-800 bg-black">

    <div class="max-w-7xl mx-auto flex justify-between items-center px-5 py-4">

      <div>

        <h1 class="text-4xl font-black">
          <span class="text-yellow-400">DBBA</span>
          <span class="text-green-400">INDIA</span>
        </h1>

        <p class="text-gray-400 text-sm">
          Predict • Play • Win
        </p>

      </div>

      <div class="flex items-center gap-4">

        <div onclick="openReports()" class="bg-gray-900 px-5 py-3 rounded-2xl border border-gray-700 cursor-pointer hover:border-yellow-400 transition">
          <p class="text-gray-400 text-sm">Balance</p>
          <h2 id="balanceText" class="text-2xl font-bold text-yellow-400">0 Coins</h2>
          <p class="text-green-400 text-xs mt-1">View Reports</p>
        </div>

        <button
        onclick="logout()"
        class="bg-red-500 hover:bg-red-400 px-5 py-3 rounded-2xl font-bold">
        Logout
        </button>

      </div>

    </div>

  </header>

  <!-- HERO, TOP CARDS, HOW TO PLAY sections remain the same -->

  <!-- MAIN -->

  <section class="max-w-7xl mx-auto px-5 grid lg:grid-cols-[1fr_350px] gap-6 pb-10">

    <!-- NUMBERS -->
    <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6">

      <div class="flex justify-between items-center mb-6">

        <div>

          <h2 class="text-3xl font-black">
            Choose Your Number
          </h2>

          <p class="text-gray-400 mt-1">
            Select any number between 00 to 99
          </p>

        </div>

        <div class="bg-green-500/10 border border-green-500/20 px-4 py-2 rounded-xl text-green-400">
          Virtual Game
        </div>

      </div>

      <!-- NUMBER GRID -->
      <div id="numbers"
      class="grid grid-cols-5 md:grid-cols-10 gap-3"></div>

    </div>

    <!-- BET SLIP -->
    <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6">
      
      <!-- TODAY WINNER -->
      <div class="bg-black border border-yellow-400 rounded-2xl p-4 mb-6 text-center">
        <p class="text-gray-400 mb-1">Today’s Winner</p>
        <h2 id="todayWinner" class="text-3xl font-black text-yellow-400">--</h2>
      </div>

      <h2 class="text-3xl font-black text-yellow-400 mb-6">Bet Slip</h2>
      
      <div class="mb-5">
        <p class="text-gray-400 mb-2">Selected Number</p>
        <div id="selected" class="bg-black border-2 border-green-500 rounded-3xl p-10 text-center text-8xl font-black text-green-400 shadow-[0_0_30px_rgba(34,197,94,0.5)]">00</div>
      </div>

      <div class="mb-5">
        <p class="text-gray-400 mb-2">Enter Coins</p>
        <input id="coins" type="number" value="0" class="w-full bg-black border border-gray-700 rounded-2xl p-4 text-2xl outline-none"/>
      </div>

      <div class="bg-green-500/10 border border-green-500/20 rounded-2xl p-5 text-center mb-6">
        <p class="text-gray-400 mb-2">Potential Win</p>
        <h2 id="win" class="text-5xl font-black text-yellow-400">90000</h2>
        <p class="text-green-400 mt-2">90x Reward</p>
      </div>

      <button id="placeBetBtn" class="w-full bg-green-500 hover:bg-green-400 text-black text-2xl font-black py-4 rounded-2xl">
        PLACE BET
      </button>

      <div class="mt-6 bg-black/50 p-4 rounded-xl">
        <p class="text-gray-400 mb-2">Current Balance</p>
        <h2 id="balanceLedgerText" class="text-2xl font-bold text-yellow-400">0 Coins</h2>
      </div>

    </div>
    
  </section>

  <!-- RECENT RESULTS remain the same -->

<script type="module">

import { supabase } from "./supabase.js";

window.openReports = function(){
  window.location.href = "reports.html";
}

// SESSION CHECK
const { data: { session } } = await supabase.auth.getSession();
if(!session) window.location.href = "index.html";

const userId = session.user.id;

// LOAD USER BALANCE & BALANCE LEDGER
async function loadBalance() {
  const { data: userData } = await supabase.from("users").select("*").eq("id", userId).single();
  const { data: ledgerData } = await supabase.from("balance_ledger").select("total_balance").order("id",{ascending:false}).limit(1).single();
  
  if(userData){
    document.getElementById("balanceText").innerText = userData.balance + " Coins";
    document.getElementById("coins").value = userData.balance;
  }
  
  if(ledgerData){
    document.getElementById("balanceLedgerText").innerText = ledgerData.total_balance + " Coins";
  }
}

// LOAD RECENT RESULTS & TODAY'S WINNER
async function loadRecentResults(){
  const { data: results } = await supabase.from("results").select("*").order("created_at",{ascending:false}).limit(10);
  const resultsGrid = document.getElementById("resultsGrid");
  resultsGrid.innerHTML = "";
  results.forEach(result => {
    const div = document.createElement("div");
    div.className = "bg-gray-900 rounded-2xl p-4 text-center";
    div.innerHTML = `
      <h2 class="text-3xl font-black text-yellow-400">${result.winning_number}</h2>
      <p class="text-gray-400 text-sm">${new Date(result.created_at).toLocaleString()}</p>
    `;
    resultsGrid.appendChild(div);
  });
  if(results.length > 0) document.getElementById("todayWinner").innerText = results[0].winning_number;
}

// INIT
window.onload = async function() {
  await loadBalance();
  await loadRecentResults();
  updatePotentialWin();
};

// LOGOUT
window.logout = async function(){
  await supabase.auth.signOut();
  window.location.href = "index.html";
};

// NUMBER GRID
const numbersDiv = document.getElementById("numbers");
const selectedDiv = document.getElementById("selected");

for(let i=0;i<100;i++){
  const num = i.toString().padStart(2,"0");
  const btn = document.createElement("button");
  btn.innerText = num;
  btn.className = "bg-[#111827] border border-gray-700 rounded-2xl p-4 text-xl font-black hover:bg-green-500 hover:text-black transition";
  btn.onclick = ()=>{ selectedDiv.innerText = num; };
  numbersDiv.appendChild(btn);
}

// WIN CALCULATION
const coinsInput = document.getElementById("coins");
const winText = document.getElementById("win");

function updatePotentialWin(){
  const coins = parseInt(coinsInput.value) || 0;
  winText.innerText = coins * 90;
}

coinsInput.addEventListener("input", updatePotentialWin);
updatePotentialWin();

// TIMER
function updateTimer(){
  const now = new Date();
  const target = new Date();
  target.setHours(9);
  target.setMinutes(15);
  target.setSeconds(0);
  if(now > target) target.setDate(target.getDate()+1);
  const diff = target - now;
  const hrs = Math.floor(diff / 1000 / 60 / 60);
  const mins = Math.floor(diff / 1000 / 60) % 60;
  const secs = Math.floor(diff / 1000) % 60;
  document.getElementById("timer").innerText =
    `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
}
updateTimer();
setInterval(updateTimer,1000);

// PLACE BET
const placeBetBtn = document.getElementById("placeBetBtn");
placeBetBtn.addEventListener("click", async () => {
  const number = selectedDiv.innerText;
  const coins = parseInt(coinsInput.value) || 0;
  if(coins <= 0){ alert("Enter valid coins"); return; }

  const { data: betData, error } = await supabase.from("bets").insert([{
    user_id: userId,
    selected_number: number,
    coins: coins,
    potential_win: coins * 90,
    status: 'pending'
  }]);
  if(error){ alert("Error placing bet: "+error.message); return; }
  alert("Bet placed successfully!");
  loadBalance(); // update ledger balance
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>DBBA INDIA</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050816] text-white">

  <!-- HEADER -->

  <header class="sticky top-0 z-50 border-b border-gray-800 bg-black">

    <div class="max-w-7xl mx-auto flex justify-between items-center px-5 py-4">

      <div>

        <h1 class="text-4xl font-black">
          <span class="text-yellow-400">DBBA</span>
          <span class="text-green-400">INDIA</span>
        </h1>

        <p class="text-gray-400 text-sm">
          Predict • Play • Win
        </p>

      </div>

      <div class="flex items-center gap-4">

        <!-- Balance Button -->
        <button onclick="openHistory()" class="bg-gray-900 px-5 py-3 rounded-2xl border border-gray-700 hover:border-yellow-400 transition flex flex-col items-center">
          <p class="text-gray-400 text-sm">Balance</p>
          <h2 id="balanceText" class="text-2xl font-bold text-yellow-400">0 Coins</h2>
          <p class="text-green-400 text-xs mt-1">View History</p>
        </button>

        <button onclick="logout()" class="bg-red-500 hover:bg-red-400 px-5 py-3 rounded-2xl font-bold">
          Logout
        </button>

      </div>

    </div>
  </header>

  <!-- HERO / Top Cards / How To Play / Main Content remains same as your code -->

  <!-- HISTORY POPUP -->
  <div id="historyPopup" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-5">

    <div class="bg-gray-900 border border-gray-800 rounded-3xl w-full max-w-3xl p-6 max-h-[90vh] overflow-auto">

      <div class="flex justify-between items-center mb-6">
        <h2 class="text-4xl font-black text-yellow-400">My History</h2>
        <button onclick="closeHistory()" class="bg-red-500 px-4 py-2 rounded-xl font-bold">X</button>
      </div>

      <!-- TRANSACTIONS -->
      <div class="mb-10">
        <h3 class="text-3xl font-black mb-5 text-green-400">Deposits & Withdraws</h3>
        <div id="transactionsList" class="space-y-3"></div>
      </div>

      <!-- BETS -->
      <div>
        <h3 class="text-3xl font-black mb-5">My Bets</h3>
        <div id="betsList" class="space-y-3"></div>
      </div>

    </div>
  </div>

  <script type="module">
    import { supabase } from "./supabase.js";

    // CHECK LOGIN
    const { data: { session } } = await supabase.auth.getSession();
    if(!session){ window.location.href = "index.html"; }

    const userId = session.user.id;

    // LOAD USER BALANCE
    const { data: userData } = await supabase
      .from("users")
      .select("*")
      .eq("id", userId)
      .single();

    if(userData){
      document.getElementById("balanceText").innerText = userData.balance + " Coins";
      if(document.getElementById("coins")) document.getElementById("coins").value = userData.balance;
    }

    // LOGOUT
    window.logout = async function(){
      await supabase.auth.signOut();
      window.location.href = "index.html";
    }

    // OPEN TRANSACTIONS POPUP
    window.openHistory = async function(){
      document.getElementById("historyPopup").classList.remove("hidden");

      // LOAD DEPOSITS
      const { data: deposits } = await supabase
        .from("deposits").select("*").eq("user_id", userId).order("id",{ascending:false});

      // LOAD WITHDRAWS
      const { data: withdraws } = await supabase
        .from("withdraws").select("*").eq("user_id", userId).order("id",{ascending:false});

      // LOAD BETS
      const { data: bets } = await supabase
        .from("bets").select("*").eq("user_id", userId).order("id",{ascending:false});

      const transactionsBox = document.getElementById("transactionsList");
      transactionsBox.innerHTML = "";

      deposits.forEach(dep => {
        transactionsBox.innerHTML += `
          <div class="bg-green-500/10 border border-green-500/20 rounded-2xl p-5 flex justify-between items-center">
            <div>
              <p class="text-gray-400 text-sm">Deposit</p>
              <h2 class="text-4xl font-black text-green-400">+${dep.amount}</h2>
            </div>
          </div>
        `;
      });

      withdraws.forEach(w => {
        transactionsBox.innerHTML += `
          <div class="bg-red-500/10 border border-red-500/20 rounded-2xl p-5 flex justify-between items-center">
            <div>
              <p class="text-gray-400 text-sm">Withdraw</p>
              <h2 class="text-4xl font-black text-red-400">-${w.amount}</h2>
            </div>
          </div>
        `;
      });

      const betsBox = document.getElementById("betsList");
      betsBox.innerHTML = "";

      bets.forEach(bet => {
        const result = bet.status === "win" ? `+${bet.potential_win}` : `-${bet.coins}`;
        const color = bet.status === "win" ? "text-green-400" : "text-red-400";

        betsBox.innerHTML += `
          <div class="bg-black border border-gray-800 rounded-2xl p-5">
            <div class="flex justify-between items-center">
              <div>
                <p class="text-gray-400 mb-2">Number</p>
                <h2 class="text-5xl font-black text-yellow-400">${bet.selected_number}</h2>
              </div>
              <div class="text-right">
                <p class="text-gray-400 mb-2">Result</p>
                <h2 class="text-4xl font-black ${color}">${result}</h2>
              </div>
            </div>
          </div>
        `;
      });
    }

    // CLOSE POPUP
    window.closeHistory = function(){
      document.getElementById("historyPopup").classList.add("hidden");
    }

  </script>

</body>
</html>

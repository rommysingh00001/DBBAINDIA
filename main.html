<script type="module">
import { supabase } from "./supabase.js";

// Elements
const balanceText = document.getElementById("balanceText");
const coinsInput = document.getElementById("coins");
const selectedDiv = document.getElementById("selected");
const placeBetBtn = document.getElementById("placeBetBtn");

let userId;

// FETCH SESSION AND INITIALIZE
const { data: { session } } = await supabase.auth.getSession();
if(!session){ window.location.href = "index.html"; return; }

userId = session.user.id;

// =======================
// 1️⃣ Load Ledger Balance
// =======================
async function loadLedgerBalance() {
  const { data: ledgerData, error } = await supabase
    .from("ledger")
    .select("amount")
    .eq("user_id", userId);

  if(error){
    console.error("Ledger fetch error:", error);
    return;
  }

  const totalBalance = ledgerData.reduce((sum, entry) => sum + Number(entry.amount), 0);

  balanceText.innerText = totalBalance + " Coins";
  coinsInput.value = totalBalance;
}

// =======================
// 2️⃣ Load Recent Results
// =======================
async function loadRecentResults() {
  const { data: results } = await supabase
    .from("results")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(10);

  const resultsGrid = document.getElementById("resultsGrid");
  resultsGrid.innerHTML = "";

  results.forEach(result => {
    const div = document.createElement("div");
    div.className = "bg-gray-900 rounded-2xl p-4 text-center";
    div.innerHTML = `
      <h2 class="text-3xl font-black text-yellow-400">${result.winning_number}</h2>
      <p class="text-gray-400 text-sm">${new Date(result.created_at).toLocaleString()}</p>
    `;
    resultsGrid.appendChild(div);
  });

  if(results.length > 0){
    document.getElementById("todayWinner").innerText = results[0].winning_number;
  }
}

// =======================
// 3️⃣ NUMBER GRID
// =======================
const numbersDiv = document.getElementById("numbers");
for(let i=0;i<100;i++){
  const num = i.toString().padStart(2,"0");
  const btn = document.createElement("button");
  btn.innerText = num;
  btn.className = "bg-[#111827] border border-gray-700 rounded-2xl p-4 text-xl font-black hover:bg-green-500 hover:text-black transition";
  btn.onclick = () => { selectedDiv.innerText = num; };
  numbersDiv.appendChild(btn);
}

// =======================
// 4️⃣ WIN CALCULATION
// =======================
function updatePotentialWin(){
  const coins = parseInt(coinsInput.value) || 0;
  document.getElementById("win").innerText = coins * 90;
}
coinsInput.addEventListener("input", updatePotentialWin);
updatePotentialWin();

// =======================
// 5️⃣ PLACE BET
// =======================
placeBetBtn.addEventListener("click", async () => {
  const number = selectedDiv.innerText;
  const coins = parseInt(coinsInput.value) || 0;
  if(coins <= 0) { alert("Enter valid coins"); return; }

  // 1. Insert bet
  const { data: betData, error } = await supabase
    .from("bets")
    .insert([{
      user_id: userId,
      selected_number: number,
      coins: coins,
      potential_win: coins * 90,
      status: 'pending'
    }]);
  if(error){ alert("Error placing bet: " + error.message); return; }

  // 2. Deduct coins from ledger
  await supabase.from("ledger").insert([{
    user_id: userId,
    amount: -coins,
    type: 'bet',
    created_at: new Date().toISOString()
  }]);

  // 3. Reload balance
  await loadLedgerBalance();

  alert("Bet placed successfully!");
});

// =======================
// 6️⃣ LOAD ON PAGE LOAD
// =======================
window.onload = async () => {
  await loadLedgerBalance();    // show current balance
  await loadRecentResults();    // show last 10 results + today’s winner
  updatePotentialWin();
};
</script>

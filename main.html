<script type="module">

import { supabase } from "./supabase.js";

// ============================
// IST TIME FUNCTION
// ============================
function getISTTime() {
  return new Date(
    new Date().toLocaleString("en-US", {
      timeZone: "Asia/Kolkata"
    })
  ).toISOString();
}

// ============================
// SESSION CHECK
// ============================
const {
  data: { session }
} = await supabase.auth.getSession();

if (!session) {
  window.location.href = "index.html";
}

const userId = session.user.id;

// ============================
// ELEMENTS
// ============================
const balanceText = document.getElementById("balanceText");
const selectedDiv = document.getElementById("selected");
const coinsInput = document.getElementById("coins");
const winText = document.getElementById("win");
const numbersDiv = document.getElementById("numbers");
const placeBetBtn = document.getElementById("placeBetBtn");

// ============================
// OPEN REPORTS
// ============================
window.openReports = function () {
  window.location.href = "reports.html";
};

// ============================
// LOGOUT
// ============================
window.logout = async function () {
  await supabase.auth.signOut();
  window.location.href = "index.html";
};

// ============================
// LOAD BALANCE FROM LEDGER
// ============================
async function loadLatestBalance() {

  const { data, error } = await supabase
    .from("balance_ledger")
    .select("balance_after")
    .eq("user_id", userId)
    .order("created_at", { ascending: false })
    .limit(1)
    .single();

  if (error || !data) {
    balanceText.innerText = "0 Coins";
    return 0;
  }

  const balance = Number(data.balance_after || 0);

  balanceText.innerText = balance + " Coins";

  return balance;
}

// ============================
// LOAD RECENT RESULTS + TODAY WINNER
// ============================
async function loadRecentResults() {

  const { data: results, error } = await supabase
    .from("results")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(10);

  if (error) {
    console.log(error);
    return;
  }

  const resultsGrid = document.getElementById("resultsGrid");

  resultsGrid.innerHTML = "";

  results.forEach((result) => {

    const div = document.createElement("div");

    div.className =
      "bg-gray-900 rounded-2xl p-4 text-center";

    div.innerHTML = `
      <h2 class="text-3xl font-black text-yellow-400">
        ${result.winning_number}
      </h2>

      <p class="text-gray-400 text-sm">
        ${new Date(result.created_at).toLocaleString("en-IN")}
      </p>
    `;

    resultsGrid.appendChild(div);
  });

  // SHOW LATEST RESULT IN TODAY WINNER
  if (results.length > 0) {
    document.getElementById("todayWinner").innerText =
      results[0].winning_number;
  }
}

// ============================
// NUMBER GRID
// ============================
for (let i = 0; i < 100; i++) {

  const num = i.toString().padStart(2, "0");

  const btn = document.createElement("button");

  btn.innerText = num;

  btn.className =
    "bg-[#111827] border border-gray-700 rounded-2xl p-4 text-xl font-black hover:bg-green-500 hover:text-black transition";

  btn.onclick = () => {
    selectedDiv.innerText = num;
  };

  numbersDiv.appendChild(btn);
}

// ============================
// POTENTIAL WIN
// ============================
function updatePotentialWin() {

  const coins = parseInt(coinsInput.value) || 0;

  winText.innerText = coins * 90;
}

coinsInput.addEventListener("input", updatePotentialWin);

updatePotentialWin();

// ============================
// TIMER
// ============================
function updateTimer() {

  const now = new Date();

  const target = new Date();

  target.setHours(9);
  target.setMinutes(15);
  target.setSeconds(0);

  if (now > target) {
    target.setDate(target.getDate() + 1);
  }

  const diff = target - now;

  const hrs = Math.floor(diff / 1000 / 60 / 60);
  const mins = Math.floor(diff / 1000 / 60) % 60;
  const secs = Math.floor(diff / 1000) % 60;

  document.getElementById("timer").innerText =
    `${hrs.toString().padStart(2, "0")}:${mins
      .toString()
      .padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
}

updateTimer();

setInterval(updateTimer, 1000);

// ============================
// PLACE BET
// ============================
placeBetBtn.addEventListener("click", async () => {

  const number = selectedDiv.innerText;

  const coins = parseInt(coinsInput.value) || 0;

  // CURRENT BALANCE
  const currentBalance = await loadLatestBalance();

  // VALIDATION
  if (coins <= 0) {
    alert("Enter Coins");
    return;
  }

  if (coins > currentBalance) {
    alert("Insufficient Balance");
    return;
  }

  // SAVE BET
  const { error: betError } = await supabase
    .from("bets")
    .insert([
      {
        user_id: userId,
        selected_number: number,
        coins: coins,
        potential_win: coins * 90,
        status: "pending",
        created_at: getISTTime()
      }
    ]);

  if (betError) {
    alert("Bet Error: " + betError.message);
    return;
  }

  // NEW BALANCE
  const newBalance = currentBalance - coins;

  // SAVE NEW BALANCE IN LEDGER
  const { error: ledgerError } = await supabase
    .from("balance_ledger")
    .insert([
      {
        user_id: userId,
        type: "bet",
        amount: coins,
        balance_after: newBalance,
        created_at: getISTTime()
      }
    ]);

  if (ledgerError) {
    alert("Ledger Error: " + ledgerError.message);
    return;
  }

  // UPDATE BALANCE HEADER
  balanceText.innerText = newBalance + " Coins";

  // RESET INPUT
  coinsInput.value = 0;

  updatePotentialWin();

  alert("Bet placed successfully!");
});

// ============================
// REALTIME BALANCE UPDATE
// ============================
supabase
  .channel("balance-ledger-live")
  .on(
    "postgres_changes",
    {
      event: "INSERT",
      schema: "public",
      table: "balance_ledger",
      filter: `user_id=eq.${userId}`
    },
    async () => {
      await loadLatestBalance();
    }
  )
  .subscribe();

// ============================
// INITIAL LOAD
// ============================
await loadLatestBalance();
await loadRecentResults();

</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DBBA INDIA</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#050816] text-white">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 border-b border-gray-800 bg-black">
    <div class="max-w-7xl mx-auto flex justify-between items-center px-5 py-4">
      <div>
        <h1 class="text-4xl font-black">
          <span class="text-yellow-400">DBBA</span>
          <span class="text-green-400">INDIA</span>
        </h1>
        <p class="text-gray-400 text-sm">Predict • Play • Win</p>
      </div>
      <div class="flex items-center gap-4">
        <div onclick="openReports()" class="bg-gray-900 px-5 py-3 rounded-2xl border border-gray-700 cursor-pointer hover:border-yellow-400 transition">
          <p class="text-gray-400 text-sm">Balance</p>
          <h2 id="balanceText" class="text-2xl font-bold text-yellow-400">0 Coins</h2>
          <p class="text-green-400 text-xs mt-1">View Reports</p>
        </div>
        <button onclick="logout()" class="bg-red-500 hover:bg-red-400 px-5 py-3 rounded-2xl font-bold">Logout</button>
      </div>
    </div>
  </header>

  <!-- HERO + TOP CARDS + HOW TO PLAY ... [unchanged] -->

  <!-- MAIN SECTION -->
  <section class="max-w-7xl mx-auto px-5 grid lg:grid-cols-[1fr_350px] gap-6 pb-10">

    <!-- NUMBERS GRID -->
    <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6">
      <div class="flex justify-between items-center mb-6">
        <div>
          <h2 class="text-3xl font-black">Choose Your Number</h2>
          <p class="text-gray-400 mt-1">Select any number between 00 to 99</p>
        </div>
        <div class="bg-green-500/10 border border-green-500/20 px-4 py-2 rounded-xl text-green-400">
          Virtual Game
        </div>
      </div>
      <div id="numbers" class="grid grid-cols-5 md:grid-cols-10 gap-3"></div>
    </div>

    <!-- BET SLIP -->
    <div class="bg-gray-900 rounded-3xl border border-gray-800 p-6">
      <div class="bg-black border border-yellow-400 rounded-2xl p-4 mb-6 text-center">
        <p class="text-gray-400 mb-1">Today’s Winner</p>
        <h2 id="todayWinner" class="text-3xl font-black text-yellow-400">--</h2>
      </div>

      <h2 class="text-3xl font-black text-yellow-400 mb-6">Bet Slip</h2>

      <div class="mb-5">
        <p class="text-gray-400 mb-2">Selected Number</p>
        <div id="selected" class="bg-black border-2 border-green-500 rounded-3xl p-10 text-center text-8xl font-black text-green-400 shadow-[0_0_30px_rgba(34,197,94,0.5)]">00</div>
      </div>

      <div class="mb-5">
        <p class="text-gray-400 mb-2">Enter Coins</p>
        <input id="coins" type="number" value="0"
          onfocus="if(this.value==='0'){this.value=''}"
          onblur="if(this.value===''){this.value='0'}"
          class="w-full bg-black border border-gray-700 rounded-2xl p-4 text-2xl outline-none"/>
      </div>

      <div class="bg-green-500/10 border border-green-500/20 rounded-2xl p-5 text-center mb-6">
        <p class="text-gray-400 mb-2">Potential Win</p>
        <h2 id="win" class="text-5xl font-black text-yellow-400">90000</h2>
        <p class="text-green-400 mt-2">90x Reward</p>
      </div>

      <button id="placeBetBtn" class="w-full bg-green-500 hover:bg-green-400 text-black text-2xl font-black py-4 rounded-2xl">
        PLACE BET
      </button>
    </div>

  </section>

  <!-- RECENT RESULTS -->
  <section class="max-w-7xl mx-auto px-5 pb-16">
    <div class="bg-gray-900 rounded-3xl border border-gray-800 p-8">
      <!-- LAST 10 WINNERS -->
      <div class="mb-10">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-4xl font-black text-yellow-400">Last 10 Winners</h2>
        </div>
        <div id="resultsGrid" class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-10 gap-4"></div>
      </div>
    </div>
  </section>

  <!-- SCRIPT -->
  <script type="module">
    import { supabase } from "./supabase.js";

    const { data:{ session } } = await supabase.auth.getSession();
    if(!session) window.location.href = "index.html";

    const userId = session.user.id;
    const balanceText = document.getElementById("balanceText");
    const selectedDiv = document.getElementById("selected");
    const coinsInput = document.getElementById("coins");
    const winText = document.getElementById("win");
    const numbersDiv = document.getElementById("numbers");
    const todayWinnerDiv = document.getElementById("todayWinner");

    // LOAD TODAY WINNER
    async function loadTodayWinner(){
      const { data, error } = await supabase
        .from("results")
        .select("*")
        .order("created_at",{ascending:false})
        .limit(1)
        .single();

      if(data){
        todayWinnerDiv.innerText = String(data.winning_number).padStart(2,"0");
      }
    }

    // LOAD LAST 10 RESULTS, SKIP TODAY WINNER
    async function loadRecentResults() {
      const { data: results } = await supabase
        .from("results")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(10);

      const resultsGrid = document.getElementById("resultsGrid");
      resultsGrid.innerHTML = "";

      const todayWinner = todayWinnerDiv.innerText;

      const filteredResults = results.filter(r =>
        String(r.winning_number).padStart(2,"0") !== todayWinner
      );

      filteredResults.forEach(r => {
        const div = document.createElement("div");
        div.className = "bg-gray-900 rounded-2xl p-4 text-center";

        div.innerHTML = `
          <h2 class="text-3xl font-black text-yellow-400">
            ${String(r.winning_number).padStart(2, "0")}
          </h2>

          <p class="text-gray-400 text-sm">
            ${new Date(r.created_at).toLocaleDateString(
              "en-IN",
              { timeZone:"Asia/Kolkata", day:"2-digit", month:"short", year:"numeric" }
            )}
          </p>
        `;

        resultsGrid.appendChild(div);
      });
    }

    // INITIAL LOAD
    await loadTodayWinner();
    await loadRecentResults();

    // NUMBER GRID
    for(let i=0;i<100;i++){
      const num = i.toString().padStart(2,"0");
      const btn = document.createElement("button");
      btn.innerText = num;
      btn.className = "bg-[#111827] border border-gray-700 rounded-2xl p-4 text-xl font-black hover:bg-green-500 hover:text-black transition";
      btn.onclick = () => selectedDiv.innerText = num;
      numbersDiv.appendChild(btn);
    }

    // POTENTIAL WIN
    function updatePotentialWin(){
      const coins = Number(coinsInput.value || 0);
      winText.innerText = coins*90;
    }
    coinsInput.addEventListener("input", updatePotentialWin);
    updatePotentialWin();

    // PLACE BET
    document.getElementById("placeBetBtn").addEventListener("click", async () => {
      const number = selectedDiv.innerText;
      const coins = Number(coinsInput.value || 0);
      if(coins <=0){ alert("Enter valid coins"); return; }

      const { data:userData } = await supabase.from("users").select("balance").eq("id", userId).single();
      const currentBalance = Number(userData.balance || 0);

      if(coins > currentBalance){ alert(`Insufficient Balance\nAvailable : ${currentBalance} Coins`); return; }

      const newBalance = currentBalance - coins;

      await supabase.from("bets").insert([{
        user_id:userId,
        selected_number:number,
        coins:coins,
        potential_win:coins*90,
        result:"pending",
        status:"pending",
        created_at:new Date().toISOString()
      }]);

      await supabase.from("users").update({ balance:newBalance }).eq("id", userId);

      await supabase.from("balance_ledger").insert([{
        user_id:userId,
        change_type:"bet",
        amount:coins,
        balance_after:newBalance,
        created_at:new Date().toISOString()
      }]);

      balanceText.innerText = newBalance+" Coins";
      coinsInput.value = "";
      updatePotentialWin();
      alert("Bet placed successfully!");
    });

    // TIMER
    function updateTimer(){
      const now = new Date();
      const target = new Date();
      target.setHours(9,15,0);
      if(now > target) target.setDate(target.getDate()+1);

      const diff = target-now;
      const hrs = Math.floor(diff/1000/60/60);
      const mins = Math.floor(diff/1000/60)%60;
      const secs = Math.floor(diff/1000)%60;
      document.getElementById("timer").innerText = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }
    updateTimer();
    setInterval(updateTimer,1000);

  </script>

  <!-- WhatsApp Button -->
  <a href="https://wa.me/918607079707?text=Hello%20I%20want%20to%20play" target="_blank"
   class="fixed bottom-4 right-4 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-5 rounded-full shadow-lg flex items-center space-x-2">
   <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="w-6 h-6">
   <span>Quick/Deposit/Withdrawal</span>
  </a>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DBBA INDIA ReportsUser</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050816] text-white">

<header class="sticky top-0 z-50 border-b border-gray-800 bg-black p-4 flex justify-between items-center">
  <h1 class="text-3xl font-black text-yellow-400">My Reports</h1>
  <button onclick="goBack()" class="bg-red-500 hover:bg-red-400 px-4 py-2 rounded-xl font-bold">Back</button>
</header>

<section class="max-w-7xl mx-auto px-5 py-8">
  <div class="flex gap-4 mb-6">
    <button onclick="showTransactions()" class="bg-green-500 hover:bg-green-400 px-6 py-3 rounded-2xl font-bold">My Transactions</button>
    <button onclick="showBets()" class="bg-yellow-400 hover:bg-yellow-300 px-6 py-3 rounded-2xl font-bold">My Bets</button>
  </div>

  <!-- TRANSACTIONS TABLE -->
  <div id="transactionsSection" class="hidden">
    <h2 class="text-2xl font-black mb-4">My Transactions</h2>
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="border-b border-gray-700">
          <th class="p-3">Date & Time</th>
          <th class="p-3">Type</th>
          <th class="p-3">Coins</th>
        </tr>
      </thead>
      <tbody id="transactionsTable">
      </tbody>
    </table>
  </div>

  <!-- BETS TABLE -->
  <div id="betsSection" class="hidden">
    <h2 class="text-2xl font-black mb-4">My Bets</h2>
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="border-b border-gray-700">
          <th class="p-3">Date & Time</th>
          <th class="p-3">Number</th>
          <th class="p-3">Coins</th>
          <th class="p-3">Result</th>
        </tr>
      </thead>
      <tbody id="betsTable">
      </tbody>
    </table>
  </div>

</section>

<script type="module">
import { supabase } from "./supabase.js";

const { data: { session } } = await supabase.auth.getSession();
if(!session) window.location.href = "index.html";

const userId = session.user.id;

window.goBack = () => window.location.href = "main.html";

window.showTransactions = async () => {
  document.getElementById("transactionsSection").classList.remove("hidden");
  document.getElementById("betsSection").classList.add("hidden");

  const { data: deposits } = await supabase
    .from("deposits")
    .select("*")
    .eq("user_id", userId)
    .order("id", {ascending:false});

  const { data: withdraws } = await supabase
    .from("withdraws")
    .select("*")
    .eq("user_id", userId)
    .order("id", {ascending:false});

  const table = document.getElementById("transactionsTable");
  table.innerHTML = "";

  deposits.forEach(dep => {
    const date = new Date(dep.created_at).toLocaleString();
    table.innerHTML += `
      <tr class="border-b border-gray-700">
        <td class="p-3">${date}</td>
        <td class="p-3 text-green-400 font-bold">Deposit</td>
        <td class="p-3 text-green-400 font-bold">+${dep.amount}</td>
      </tr>
    `;
  });

  withdraws.forEach(w => {
    const date = new Date(w.created_at).toLocaleString();
    table.innerHTML += `
      <tr class="border-b border-gray-700">
        <td class="p-3">${date}</td>
        <td class="p-3 text-red-400 font-bold">Withdraw</td>
        <td class="p-3 text-red-400 font-bold">-${w.amount}</td>
      </tr>
    `;
  });
}

window.showBets = async () => {
  document.getElementById("betsSection").classList.remove("hidden");
  document.getElementById("transactionsSection").classList.add("hidden");

  const { data: bets } = await supabase
    .from("bets")
    .select("*")
    .eq("user_id", userId)
    .order("id", {ascending:false});

  const table = document.getElementById("betsTable");
  table.innerHTML = "";

  bets.forEach(bet => {
    const date = new Date(bet.created_at).toLocaleString();
    const result = bet.status === "win" ? `+${bet.potential_win}` : `-${bet.coins}`;
    const color = bet.status === "win" ? "text-green-400 font-bold" : "text-red-400 font-bold";
    table.innerHTML += `
      <tr class="border-b border-gray-700">
        <td class="p-3">${date}</td>
        <td class="p-3">${bet.selected_number}</td>
        <td class="p-3">${bet.coins}</td>
        <td class="p-3 ${color}">${result}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Reset Password</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050816] text-white min-h-screen flex items-center justify-center p-5">

  <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 w-full max-w-md">

    <h2 class="text-3xl font-black text-center mb-6">

      Reset Password

    </h2>





    <input
      id="newPassword"
      type="password"
      placeholder="New Password"
      class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"
    />





    <button
      id="resetBtn"
      onclick="resetPassword()"
      class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-2xl"
    >

      UPDATE PASSWORD

    </button>

  </div>





  <script type="module">

    import {
      supabase
    } from "./supabase.js";



    window.resetPassword =
      async function(){

        const btn =
          document.getElementById(
            "resetBtn"
          );

        try {

          btn.disabled = true;

          btn.innerText =
            "PLEASE WAIT...";



          const newPassword =
            document
              .getElementById(
                "newPassword"
              )
              .value
              .trim();

          if(newPassword.length < 6){

            alert(
              "Password minimum 6 characters"
            );

            return;
          }



          const {
            error
          } =
            await supabase.auth
              .updateUser({

                password:
                  newPassword

              });

          if(error){

            throw error;
          }



          alert(
            "Password Updated Successfully"
          );

          window.location.href =
            "login.html";



        } catch(err){

          console.error(err);

          alert(err.message);



        } finally {

          btn.disabled = false;

          btn.innerText =
            "UPDATE PASSWORD";
        }
      };

  </script>

</body>
</html>

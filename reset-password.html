<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#050816] text-white min-h-screen flex items-center justify-center p-5">

  <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 w-full max-w-md">

    <h2 class="text-3xl font-black text-center mb-6 text-yellow-400">
      Reset Password
    </h2>

    <input
      type="password"
      id="newPassword"
      placeholder="Enter New Password"
      class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"
    />

    <button
      id="updatePasswordBtn"
      class="w-full bg-green-400 hover:bg-green-300 text-black font-black py-4 rounded-2xl transition"
    >
      UPDATE PASSWORD
    </button>

  </div>

  <script type="module">

    import { supabase } from "./supabase.js";

    document
      .getElementById("updatePasswordBtn")
      .addEventListener("click", async function(){

        const newPassword =
          document.getElementById("newPassword").value.trim();

        if(!newPassword){
          alert("Please enter new password");
          return;
        }

        const { error } =
          await supabase.auth.updateUser({

            password: newPassword
          });

        if(error){

          alert(error.message);

        } else {

          alert("Password updated successfully");

          window.location.href = "login.html";
        }

    });

  </script>

</body>
</html>

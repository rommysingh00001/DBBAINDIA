<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - DBBA INDIA</title>
    <link rel="icon" type="image/png" href="logo.png">

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050816] text-white min-h-screen flex items-center justify-center p-5">

  <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 w-full max-w-md">
    <h2 class="text-3xl font-black text-center mb-4 text-yellow-400">Reset Password</h2>
    <p class="text-center text-gray-400 mb-6">Enter your new password below</p>

    <input
      id="newPassword"
      type="password"
      placeholder="New Password"
      class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"
    />

    <input
      id="confirmPassword"
      type="password"
      placeholder="Confirm Password"
      class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-4 outline-none"
    />

    <button
      id="resetBtn"
      class="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-black py-4 rounded-2xl mb-4 transition"
    >
      Reset Password
    </button>

    <a href="login.html" class="block text-center text-green-400 font-bold mt-2">
      Back to Login
    </a>
  </div>

 <script type="module">
import { supabase } from "./supabase.js";

document.getElementById("resetBtn").addEventListener("click", async () => {
  try {
    const newPassword = document.getElementById("newPassword").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    if(!newPassword || !confirmPassword){
      alert("Please fill both fields");
      return;
    }

    if(newPassword !== confirmPassword){
      alert("Passwords do not match");
      return;
    }

    // Update password using Supabase (token is automatically read from URL)
    const { error } = await supabase.auth.updateUser({ password: newPassword });

    if(error) throw error;

    alert("Password reset successful! You can now login.");
    window.location.href = "login.html";

  } catch(err){
    console.error(err);
    alert(err.message);
  }
});
</script>

</body>
</html>

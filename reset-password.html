<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Reset Password</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

<div class="bg-gray-900 p-8 rounded-3xl w-full max-w-md">

<h1 class="text-3xl font-black text-center mb-6 text-green-400">
Reset Password
</h1>

<input
id="newPassword"
type="password"
placeholder="New Password"
class="w-full bg-black border border-gray-700 rounded-2xl p-4 mb-5 outline-none"
/>

<button
onclick="updatePassword()"
class="w-full bg-green-500 text-black font-black py-4 rounded-2xl"
>

UPDATE PASSWORD

</button>

</div>

<script type="module">

import { supabase } from "./supabase.js";

window.updatePassword = async function(){

  const password =
    document.getElementById("newPassword").value;

  if(password.length < 6){

    alert("Minimum 6 characters");
    return;
  }

  const { error } =
    await supabase.auth.updateUser({

      password: password

    });

  if(error){

    alert(error.message);
    return;
  }

  alert("Password updated successfully");

  window.location.href =
    "login.html";
};

</script>

</body>
</html>

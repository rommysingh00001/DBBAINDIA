<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel - DBBA INDIA</title>
<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050816] text-white p-6">

<!-- HEADER, USERS, NUMBER GRID, PNL sections remain unchanged -->

<!-- PNL -->
<div id="pnlSection" class="bg-gray-900 border border-gray-800 rounded-3xl p-6 mb-8">
  <h2 class="text-3xl font-black text-orange-400 mb-6">Profit & Loss Analytics</h2>
  <div class="grid md:grid-cols-3 gap-4 mb-6">
    <input type="date" id="pnlFromDate" class="bg-black border border-gray-700 rounded-2xl p-4 outline-none"/>
    <input type="date" id="pnlToDate" class="bg-black border border-gray-700 rounded-2xl p-4 outline-none"/>
    <button onclick="loadPNLReport()" class="bg-orange-500 hover:bg-orange-400 text-black font-black rounded-2xl p-4">
      Generate Report
    </button>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-700">
      <thead>
        <tr>
          <th class="px-4 py-3 text-left text-gray-400">From</th>
          <th class="px-4 py-3 text-left text-gray-400">To</th>
          <th class="px-4 py-3 text-left text-gray-400">Total Collection</th>
          <th class="px-4 py-3 text-left text-gray-400">Payout Expense</th>
          <th class="px-4 py-3 text-left text-gray-400">Profit / Loss</th>
        </tr>
      </thead>
      <tbody id="pnlTableBody"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { supabase } from "./supabase.js";
let allBetData = [];
let allUsersData = [];
let selectedWinningNumber = null;

window.loadPNLReport = async function(fromDate=null, toDate=null){
  const fromInput = fromDate || document.getElementById("pnlFromDate").value;
  const toInput = toDate || document.getElementById("pnlToDate").value;
  let query = supabase.from("bets").select("*");
  if(fromInput) query = query.gte("created_at", fromInput + "T00:00:00Z");
  if(toInput) query = query.lte("created_at", toInput + "T23:59:59Z");
  const { data: bets = [] } = await query;
  let totalCollection = 0;
  let payoutExpense = 0;
  const selectedNumber = selectedWinningNumber;

  if(!fromInput && !toInput){
    const pendingBets = bets.filter(bet => bet.status === "pending");
    totalCollection = pendingBets.reduce((sum, bet) => sum + Number(bet.coins || 0), 0);
    if(selectedNumber){
      payoutExpense = pendingBets.filter(bet => bet.selected_number == selectedNumber)
                                  .reduce((sum, bet) => sum + Number(bet.potential_win || 0), 0);
    }
  } else {
    const { data: lastResult = [] } = await supabase.from("results")
      .select("*")
      .gte("created_at", fromInput + "T00:00:00Z")
      .lte("created_at", toInput + "T23:59:59Z")
      .order("created_at", { ascending: false })
      .limit(1);
    const lastNumber = lastResult[0]?.winning_number;
    totalCollection = bets.reduce((sum, bet) => sum + Number(bet.coins || 0), 0);
    payoutExpense = bets.filter(bet => bet.selected_number == lastNumber)
                        .reduce((sum, bet) => sum + Number(bet.potential_win || 0), 0);
  }

  const profitLoss = totalCollection - payoutExpense;
  const tbody = document.getElementById("pnlTableBody");
  tbody.innerHTML = `
    <tr>
      <td class="px-4 py-4">${fromInput || "-"}</td>
      <td class="px-4 py-4">${toInput || "-"}</td>
      <td class="px-4 py-4 text-green-400 font-black">₹${totalCollection}</td>
      <td class="px-4 py-4 text-yellow-400 font-black">₹${payoutExpense}</td>
      <td class="px-4 py-4 font-black ${profitLoss>=0?"text-green-400":"text-red-400"}">
        ${profitLoss>=0?"+":"-"}₹${Math.abs(profitLoss)}
      </td>
    </tr>
  `;
}

window.selectWinningNumber = function(number){
  selectedWinningNumber = number;
  document.getElementById("selectedNumberText").innerText = "Selected Number : " + number;
  loadPNLReport();
};

window.announceSelectedResult = async function(){
  if(!selectedWinningNumber){ alert("Select Number First"); return; }
  await supabase.from("results").insert([{ winning_number: selectedWinningNumber, created_at: new Date().toISOString() }]);
  const { data: bets = [] } = await supabase.from("bets").select("*").eq("status","pending");

  for(const bet of bets){
    const { data: user } = await supabase.from("users").select("*").eq("id", bet.user_id).single();
    const currentBalance = Number(user.balance) || 0;
    let newBalance = currentBalance;
    let status = "lose";
    if(bet.selected_number === selectedWinningNumber){ newBalance += Number(bet.potential_win); status = "win"; }
    await supabase.from("users").update({ balance: newBalance }).eq("id", bet.user_id);
    await supabase.from("bets").update({ status: status }).eq("id", bet.id);
  }

  alert("Result Announced : " + selectedWinningNumber);
  selectedWinningNumber = null;
  document.getElementById("selectedNumberText").innerText = "Selected Number : --";
  await loadPendingNumberGrid();
  await loadPNLReport();
  await loadAllBetData();
};

window.onload = async ()=>{
  try{ await loadUsers(); } catch(e){ console.error(e); }
  try{ await loadAllBetData(); } catch(e){ console.error(e); }
  try{ await loadPendingNumberGrid(); } catch(e){ console.error(e); }
  try{ await loadPNLReport(); } catch(e){ console.error(e); }
};
</script>
</body>
</html>

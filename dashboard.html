<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - DBBA INDIA</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050816] text-white p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
  <h1 class="text-4xl font-black text-green-400">ADMIN DASHBOARD</h1>
  <button onclick="logoutAdmin()" class="bg-red-500 hover:bg-red-400 px-5 py-2 rounded-2xl font-black">Logout</button>
</div>

<!-- USERS SECTION -->
<div class="bg-gray-900 border border-gray-800 rounded-3xl p-6 mb-8">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-black text-green-400">Manage Users</h2>
    <button onclick="loadUsers()" class="bg-green-500 hover:bg-green-400 px-5 py-2 rounded-2xl font-black">Refresh Users</button>
  </div>

  <!-- FILTERS -->
  <div class="grid md:grid-cols-5 gap-4 mb-4">
    <input type="text" id="userNameFilter" placeholder="Name" class="bg-black border border-gray-700 rounded-2xl p-2"/>
    <input type="text" id="userEmailFilter" placeholder="Email" class="bg-black border border-gray-700 rounded-2xl p-2"/>
    <input type="text" id="userPhoneFilter" placeholder="Phone" class="bg-black border border-gray-700 rounded-2xl p-2"/>
    <input type="number" id="userBalanceFilter" placeholder="Min Balance" class="bg-black border border-gray-700 rounded-2xl p-2"/>
    <input type="text" id="userManagerFilter" placeholder="Account Manager" class="bg-black border border-gray-700 rounded-2xl p-2"/>
  </div>

  <div class="flex gap-4 mb-4">
    <button onclick="applyUserFilters()" class="bg-green-500 hover:bg-green-400 px-5 py-2 rounded-2xl font-black">Apply Filters</button>
    <button onclick="clearUserFilters()" class="bg-red-500 hover:bg-red-400 px-5 py-2 rounded-2xl font-black">Clear Filters</button>
  </div>

  <!-- USERS TABLE -->
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-700">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Balance</th>
          <th>Account Manager</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersList"></tbody>
    </table>
  </div>
</div>

<!-- AUTO RESULT ANNOUNCE -->
<div class="bg-gray-900 border border-gray-800 rounded-3xl p-6">
  <h2 class="text-2xl font-black text-pink-400 mb-4">Auto Result Announcement</h2>
  <p id="nextResultText" class="mb-2 text-gray-400">Next scheduled result will announce automatically every hour.</p>
  <p id="lastResultText" class="mb-2 text-yellow-400 font-bold">Last announced number: --</p>
</div>

<script type="module">
import { supabase } from "./supabase.js";

let allUsersData = [];
let selectedWinningNumber = null;

// LOAD USERS
async function loadUsers() {
  const { data, error } = await supabase.from("users").select("*");
  if(error){ alert(error.message); return; }
  allUsersData = data || [];
  renderUsers(allUsersData);
}

function renderUsers(users){
  const tbody = document.getElementById("usersList");
  tbody.innerHTML = "";
  users.forEach((u,i)=>{
    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${u.full_name || "-"}</td>
        <td>${u.email || "-"}</td>
        <td>${u.phone || "-"}</td>
        <td id="balance-${u.id}">${u.balance || 0}</td>
        <td>${u.account_manager || "-"}</td>
        <td class="flex gap-2">
          <input type="number" id="credit-${u.id}" placeholder="Credit" class="w-16 p-1 rounded bg-black border border-green-500"/>
          <button onclick="creditBalance('${u.id}')" class="bg-green-500 px-2 rounded">Credit</button>
          <input type="number" id="debit-${u.id}" placeholder="Debit" class="w-16 p-1 rounded bg-black border border-red-500"/>
          <button onclick="debitBalance('${u.id}')" class="bg-red-500 px-2 rounded">Debit</button>
        </td>
      </tr>
    `;
  });
}

// FILTERS
function applyUserFilters(){
  const name = document.getElementById("userNameFilter").value.toLowerCase();
  const email = document.getElementById("userEmailFilter").value.toLowerCase();
  const phone = document.getElementById("userPhoneFilter").value.toLowerCase();
  const balance = Number(document.getElementById("userBalanceFilter").value) || 0;
  const manager = document.getElementById("userManagerFilter").value.toLowerCase();

  const filtered = allUsersData.filter(u=>{
    return (!name || (u.full_name||"").toLowerCase().includes(name)) &&
           (!email || (u.email||"").toLowerCase().includes(email)) &&
           (!phone || (u.phone||"").toLowerCase().includes(phone)) &&
           ((Number(u.balance)||0) >= balance) &&
           (!manager || (u.account_manager||"").toLowerCase().includes(manager));
  });
  renderUsers(filtered);
}

function clearUserFilters(){
  document.getElementById("userNameFilter").value="";
  document.getElementById("userEmailFilter").value="";
  document.getElementById("userPhoneFilter").value="";
  document.getElementById("userBalanceFilter").value="";
  document.getElementById("userManagerFilter").value="";
  renderUsers(allUsersData);
}

// CREDIT / DEBIT
window.creditBalance = async function(userId){
  const amount = Number(document.getElementById(`credit-${userId}`).value);
  if(amount <= 0){ alert("Enter valid amount"); return; }
  const { data:user } = await supabase.from("users").select("*").eq("id", userId).single();
  const newBalance = (Number(user.balance)||0)+amount;
  await supabase.from("users").update({balance:newBalance}).eq("id", userId);
  document.getElementById(`balance-${userId}`).innerText = newBalance;
  alert("Balance Credited");
};

window.debitBalance = async function(userId){
  const amount = Number(document.getElementById(`debit-${userId}`).value);
  if(amount <= 0){ alert("Enter valid amount"); return; }
  const { data:user } = await supabase.from("users").select("*").eq("id", userId).single();
  const current = Number(user.balance)||0;
  if(amount > current){ alert("Insufficient Balance"); return; }
  const newBalance = current-amount;
  await supabase.from("users").update({balance:newBalance}).eq("id", userId);
  document.getElementById(`balance-${userId}`).innerText = newBalance;
  alert("Balance Debited");
};

// AUTO RESULT ANNOUNCE
async function announceSelectedResult(){
  const { data:bets=[] } = await supabase.from("bets").select("*").eq("status","pending");
  if(bets.length===0){ alert("No pending bets to announce"); return; }

  const totals={}; for(let i=0;i<=99;i++){ totals[i.toString().padStart(2,"0")]=0; }
  bets.forEach(bet=>{ totals[String(bet.selected_number).padStart(2,"0")]+=Number(bet.coins||0); });

  // CASE 1 & 2: zero bets
  const zeroBetNumbers = Object.keys(totals).filter(n=>totals[n]===0);
  if(zeroBetNumbers.length>0){
    const selected = zeroBetNumbers.length===1 ? zeroBetNumbers[0] : zeroBetNumbers[Math.floor(Math.random()*zeroBetNumbers.length)];
    selectedWinningNumber = selected;
    document.getElementById("lastResultText").innerText = `Last announced number: ${selectedWinningNumber}`;
    alert(`Auto Result Announced (Zero Bet): ${selectedWinningNumber}`);
    return;
  }

  // CASE 3: all numbers have bets -> min coins
  const minBetNumber = Object.keys(totals).reduce((a,b)=>totals[a]<totals[b]?a:b);
  selectedWinningNumber = minBetNumber;
  document.getElementById("lastResultText").innerText = `Last announced number: ${selectedWinningNumber}`;
  alert(`Auto Result Announced (Min Coins): ${selectedWinningNumber}`);
}

// Auto-run every hour at minute 0
setInterval(()=>{
  const now = new Date();
  if(now.getMinutes()===0){ announceSelectedResult(); }
},60000);

// LOGOUT
window.logoutAdmin = async function(){
  await supabase.auth.signOut();
  localStorage.clear(); sessionStorage.clear();
  window.location.href="login.html";
};

// INITIAL LOAD
window.onload = async function(){
  await loadUsers();
};
</script>
</body>
</html>

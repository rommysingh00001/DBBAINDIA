<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Admin Panel - DBBA INDIA</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050816] text-white p-6">

<!-- HEADER -->
<div class="flex flex-wrap justify-between items-center gap-4 mb-8">

  <h1 class="text-5xl font-black text-yellow-400">
    ADMIN PANEL
  </h1>

  <div class="flex gap-4 flex-wrap">

    <button
      onclick="scrollToUsers()"
      class="bg-green-500 hover:bg-green-400 text-black px-5 py-3 rounded-2xl font-black">

      Manage Users

    </button>

    <button
      onclick="scrollToAnnounce()"
      class="bg-yellow-400 hover:bg-yellow-300 text-black px-5 py-3 rounded-2xl font-black">

      Announce Winner

    </button>

    <button
      onclick="scrollToReports()"
      class="bg-blue-500 hover:bg-blue-400 text-black px-5 py-3 rounded-2xl font-black">

      Daily Reports

    </button>
<!-- HEADER BUTTONS KE ANDAR YE BUTTON ADD KARO -->

<button
  onclick="logoutAdmin()"
  class="bg-red-500 hover:bg-red-400 text-white px-5 py-3 rounded-2xl font-black">

  Logout

</button>
    
  </div>

</div>

<!-- ANNOUNCE -->
<div
id="announceSection"
class="bg-gray-900 border border-gray-800 rounded-3xl p-6 mb-8">

  <h2 class="text-3xl font-black text-yellow-400 mb-5">
    Announce Today's Winner
  </h2>

  <div class="flex gap-4 flex-wrap">

    <input
      type="text"
      id="resultInput"
      placeholder="Enter Winning Number"
      class="bg-black border border-gray-700 rounded-2xl p-4 flex-1 outline-none"/>

    <button
      onclick="announceResult()"
      class="bg-yellow-400 hover:bg-yellow-300 text-black font-black px-6 py-4 rounded-2xl">

      ANNOUNCE

    </button>

  </div>

</div>

<!-- USERS -->
<div
id="usersSection"
class="bg-gray-900 border border-gray-800 rounded-3xl p-6 mb-8">

  <h2 class="text-3xl font-black text-green-400 mb-6">
    Manage Users
  </h2>

  <!-- USER FILTERS -->
  <div class="grid md:grid-cols-4 gap-4 mb-6">

    <input
      type="text"
      id="userNameFilter"
      placeholder="Search Name"
      class="bg-black border border-gray-700 rounded-2xl p-3 outline-none"/>

    <input
      type="text"
      id="userEmailFilter"
      placeholder="Search Email"
      class="bg-black border border-gray-700 rounded-2xl p-3 outline-none"/>

    <input
      type="text"
      id="userPhoneFilter"
      placeholder="Search Phone"
      class="bg-black border border-gray-700 rounded-2xl p-3 outline-none"/>

    <input
      type="number"
      id="userBalanceFilter"
      placeholder="Minimum Balance"
      class="bg-black border border-gray-700 rounded-2xl p-3 outline-none"/>

  </div>

  <div class="flex gap-4 mb-6">

    <button
      onclick="applyUserFilters()"
      class="bg-green-500 hover:bg-green-400 text-black font-black px-5 py-3 rounded-2xl">

      Apply User Filters

    </button>

    <button
      onclick="clearUserFilters()"
      class="bg-red-500 hover:bg-red-400 text-white font-black px-5 py-3 rounded-2xl">

      Clear Filters

    </button>

  </div>

  <div class="overflow-x-auto">

    <table class="min-w-full divide-y divide-gray-700">

      <thead>

        <tr>

          <th class="px-4 py-3 text-left text-gray-400">#</th>
          <th class="px-4 py-3 text-left text-gray-400">Name</th>
          <th class="px-4 py-3 text-left text-gray-400">Email</th>
          <th class="px-4 py-3 text-left text-gray-400">Phone</th>
          <th class="px-4 py-3 text-left text-gray-400">Balance</th>
          <th class="px-4 py-3 text-left text-gray-400">Actions</th>

        </tr>

      </thead>

      <tbody
      id="usersList"
      class="divide-y divide-gray-700"></tbody>

    </table>

  </div>

</div>

<!-- REPORTS -->
<div
id="reportsSection"
class="bg-gray-900 border border-gray-800 rounded-3xl p-6">

  <h2 class="text-3xl font-black text-blue-400 mb-6">
    Daily Betting Reports
  </h2>

  <!-- FILTERS -->
  <div class="bg-black border border-gray-800 rounded-3xl p-5 mb-6">

    <h2 class="text-2xl font-black text-yellow-400 mb-5">
      Advanced Filters
    </h2>

    <div class="grid md:grid-cols-5 gap-4">

      <input
        type="text"
        id="filterUser"
        placeholder="Search User"
        class="bg-gray-900 border border-gray-700 rounded-2xl p-3 outline-none"/>

      <input
        type="text"
        id="filterEmail"
        placeholder="Search Email"
        class="bg-gray-900 border border-gray-700 rounded-2xl p-3 outline-none"/>

      <input
        type="text"
        id="filterNumber"
        placeholder="Search Number"
        class="bg-gray-900 border border-gray-700 rounded-2xl p-3 outline-none"/>

      <select
        id="filterStatus"
        class="bg-gray-900 border border-gray-700 rounded-2xl p-3 outline-none">

        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="win">Win</option>
        <option value="lose">Lose</option>

      </select>

      <input
        type="date"
        id="filterDate"
        class="bg-gray-900 border border-gray-700 rounded-2xl p-3 outline-none"/>

    </div>

    <div class="flex gap-4 mt-5">

      <button
        onclick="applyFilters()"
        class="bg-green-500 hover:bg-green-400 text-black font-black px-5 py-3 rounded-2xl">

        Apply Filters

      </button>

      <button
        onclick="clearFilters()"
        class="bg-red-500 hover:bg-red-400 text-white font-black px-5 py-3 rounded-2xl">

        Clear Filters

      </button>

    </div>

  </div>

  <!-- SUMMARY -->
  <div class="grid md:grid-cols-3 gap-5 mb-6">

    <div class="bg-black border border-gray-800 rounded-3xl p-6">
      <p class="text-gray-400 mb-2">Total Bets</p>
      <h2 id="totalBets" class="text-4xl font-black text-yellow-400">0</h2>
    </div>

    <div class="bg-black border border-gray-800 rounded-3xl p-6">
      <p class="text-gray-400 mb-2">Total Coins</p>
      <h2 id="totalCoins" class="text-4xl font-black text-green-400">0</h2>
    </div>

    <div class="bg-black border border-gray-800 rounded-3xl p-6">
      <p class="text-gray-400 mb-2">Winning Bets</p>
      <h2 id="winningBets" class="text-4xl font-black text-blue-400">0</h2>
    </div>

  </div>

  <!-- TABLE -->
  <div class="overflow-x-auto">

    <table class="min-w-full divide-y divide-gray-700">

      <thead>

        <tr>

          <th class="px-4 py-3 text-left text-gray-400">User</th>
          <th class="px-4 py-3 text-left text-gray-400">Email</th>
          <th class="px-4 py-3 text-left text-gray-400">Number</th>
          <th class="px-4 py-3 text-left text-gray-400">Coins</th>
          <th class="px-4 py-3 text-left text-gray-400">Status</th>
          <th class="px-4 py-3 text-left text-gray-400">Date & Time</th>

        </tr>

      </thead>

      <tbody
      id="userBetReportTable"
      class="divide-y divide-gray-700"></tbody>

    </table>

  </div>

</div>

<script type="module">

import { supabase } from "./supabase.js";

let allBetData = [];
let allUsersData = [];

// SCROLL
window.scrollToUsers = () => {
  document.getElementById("usersSection")
  .scrollIntoView({behavior:"smooth"});
}

window.scrollToAnnounce = () => {
  document.getElementById("announceSection")
  .scrollIntoView({behavior:"smooth"});
}

window.scrollToReports = () => {
  document.getElementById("reportsSection")
  .scrollIntoView({behavior:"smooth"});
}

// LOAD USERS
async function loadUsers(){

  const { data:users=[] } =
    await supabase
    .from("users")
    .select("*")
    .order("created_at",{ascending:false});

  allUsersData = users;

  renderUsers(users);
}

// RENDER USERS
function renderUsers(users){

  const usersList =
    document.getElementById("usersList");

  usersList.innerHTML = "";

  users.forEach((user,index)=>{

    usersList.innerHTML += `

      <tr>

        <td class="px-4 py-3">${index+1}</td>
        <td class="px-4 py-3">${user.full_name || "-"}</td>
        <td class="px-4 py-3">${user.email || "-"}</td>
        <td class="px-4 py-3">${user.phone || "-"}</td>

        <td
        class="px-4 py-3 text-yellow-400 font-black"
        id="balance-${user.id}">
          ${user.balance || 0}
        </td>

        <td class="px-4 py-3 space-y-3">

          <div class="flex gap-2">

            <input
              type="number"
              id="credit-${user.id}"
              placeholder="Credit"
              class="bg-black border border-green-500 rounded-2xl p-2 w-24"/>

            <button
              onclick="creditBalance('${user.id}')"
              class="bg-green-500 px-3 py-2 rounded-xl font-bold text-black">

              Credit

            </button>

          </div>

          <div class="flex gap-2">

            <input
              type="number"
              id="debit-${user.id}"
              placeholder="Debit"
              class="bg-black border border-red-500 rounded-2xl p-2 w-24"/>

            <button
              onclick="debitBalance('${user.id}')"
              class="bg-red-500 px-3 py-2 rounded-xl font-bold">

              Debit

            </button>

          </div>

        </td>

      </tr>

    `;
  });
}

// USER FILTERS
window.applyUserFilters = function(){

  const name =
    document.getElementById("userNameFilter")
    .value.toLowerCase();

  const email =
    document.getElementById("userEmailFilter")
    .value.toLowerCase();

  const phone =
    document.getElementById("userPhoneFilter")
    .value.toLowerCase();

  const balance =
    parseInt(
      document.getElementById("userBalanceFilter").value
    ) || 0;

  const filtered =
    allUsersData.filter(user=>{

      const fullName =
        (user.full_name || "").toLowerCase();

      const userEmail =
        (user.email || "").toLowerCase();

      const userPhone =
        (user.phone || "").toLowerCase();

      const userBalance =
        Number(user.balance) || 0;

      return (

        (!name || fullName.includes(name)) &&
        (!email || userEmail.includes(email)) &&
        (!phone || userPhone.includes(phone)) &&
        (userBalance >= balance)

      );
    });

  renderUsers(filtered);
}

window.clearUserFilters = function(){

  document.getElementById("userNameFilter").value="";
  document.getElementById("userEmailFilter").value="";
  document.getElementById("userPhoneFilter").value="";
  document.getElementById("userBalanceFilter").value="";

  renderUsers(allUsersData);
}

// CREDIT
window.creditBalance = async function(userId){

  const amount =
    parseInt(
      document.getElementById(`credit-${userId}`).value
    );

  if(!amount || amount <= 0){
    alert("Enter valid amount");
    return;
  }

  const { data:user } =
    await supabase
    .from("users")
    .select("*")
    .eq("id",userId)
    .single();

  const currentBalance =
    Number(user.balance) || 0;

  const newBalance =
    currentBalance + amount;

  await supabase
  .from("users")
  .update({
    balance:newBalance
  })
  .eq("id",userId);

  await supabase
  .from("balance_ledger")
  .insert([{
    user_id:userId,
    change_type:"credit",
    amount:amount,
    balance_after:newBalance,
    created_at:new Date().toISOString()
  }]);

  document.getElementById(
    `balance-${userId}`
  ).innerText = newBalance;

  alert("Balance Credited");
}

// DEBIT
window.debitBalance = async function(userId){

  const amount =
    parseInt(
      document.getElementById(`debit-${userId}`).value
    );

  if(!amount || amount <= 0){
    alert("Enter valid amount");
    return;
  }

  const { data:user } =
    await supabase
    .from("users")
    .select("*")
    .eq("id",userId)
    .single();

  const currentBalance =
    Number(user.balance) || 0;

  if(amount > currentBalance){
    alert("Insufficient Balance");
    return;
  }

  const newBalance =
    currentBalance - amount;

  await supabase
  .from("users")
  .update({
    balance:newBalance
  })
  .eq("id",userId);

  await supabase
  .from("balance_ledger")
  .insert([{
    user_id:userId,
    change_type:"debit",
    amount:amount,
    balance_after:newBalance,
    created_at:new Date().toISOString()
  }]);

  document.getElementById(
    `balance-${userId}`
  ).innerText = newBalance;

  alert("Balance Debited");
}

// ANNOUNCE RESULT
window.announceResult = async function(){

  const value =
    document.getElementById("resultInput")
    .value.trim();

  if(!value){
    alert("Enter winning number");
    return;
  }

  await supabase
  .from("results")
  .insert([{
    winning_number:value,
    created_at:new Date().toISOString()
  }]);

  const { data:bets=[] } =
    await supabase
    .from("bets")
    .select("*")
    .eq("status","pending");

  for(const bet of bets){

    if(bet.selected_number === value){

      const { data:user } =
        await supabase
        .from("users")
        .select("*")
        .eq("id",bet.user_id)
        .single();

      const currentBalance =
        Number(user.balance) || 0;

      const newBalance =
        currentBalance +
        Number(bet.potential_win);

      await supabase
      .from("users")
      .update({
        balance:newBalance
      })
      .eq("id",bet.user_id);

      await supabase
      .from("bets")
      .update({
        status:"win"
      })
      .eq("id",bet.id);

      await supabase
      .from("balance_ledger")
      .insert([{
        user_id:bet.user_id,
        type:"win",
        amount:bet.potential_win,
        balance_after:newBalance,
        created_at:new Date().toISOString()
      }]);

    } else {

      await supabase
      .from("bets")
      .update({
        status:"lose"
      })
      .eq("id",bet.id);

    }
  }

  alert("Result Announced Successfully");

  document.getElementById("resultInput").value="";

  loadAllBetData();
}

// LOAD BET DATA
async function loadAllBetData(){

  const { data:bets=[] } =
    await supabase
    .from("bets")
    .select(`
      *,
      users (
        full_name,
        email
      )
    `)
    .order("created_at",{ascending:false});

  allBetData = bets;

  renderFilteredData(allBetData);
}

// RENDER DATA
function renderFilteredData(data){

  const table =
    document.getElementById("userBetReportTable");

  table.innerHTML = "";

  let totalCoins = 0;
  let totalWins = 0;

  data.forEach(bet=>{

    totalCoins += Number(bet.coins || 0);

    if(bet.status === "win"){
      totalWins++;
    }

    table.innerHTML += `

      <tr>

        <td class="px-4 py-3">
          ${bet.users?.full_name || "-"}
        </td>

        <td class="px-4 py-3">
          ${bet.users?.email || "-"}
        </td>

        <td class="px-4 py-3 text-yellow-400 font-black">
          ${bet.selected_number}
        </td>

        <td class="px-4 py-3">
          ${bet.coins}
        </td>

        <td class="px-4 py-3">

          <span class="
            ${bet.status==="win"
              ?"text-green-400"
              :bet.status==="lose"
              ?"text-red-400"
              :"text-yellow-400"}
            font-black">

            ${bet.status}

          </span>

        </td>

        <td class="px-4 py-3">

          ${new Date(bet.created_at)
            .toLocaleString(
              "en-IN",
              {
                timeZone:"Asia/Kolkata",
                day:"2-digit",
                month:"short",
                year:"numeric",
                hour:"2-digit",
                minute:"2-digit"
              }
            )}

        </td>

      </tr>

    `;
  });

  document.getElementById("totalBets")
  .innerText = data.length;

  document.getElementById("totalCoins")
  .innerText = totalCoins;

  document.getElementById("winningBets")
  .innerText = totalWins;
}

// REPORT FILTERS
window.applyFilters = function(){

  const user =
    document.getElementById("filterUser")
    .value.toLowerCase();

  const email =
    document.getElementById("filterEmail")
    .value.toLowerCase();

  const number =
    document.getElementById("filterNumber")
    .value.toLowerCase();

  const status =
    document.getElementById("filterStatus")
    .value.toLowerCase();

  const date =
    document.getElementById("filterDate")
    .value;

  let filtered =
    allBetData.filter(bet=>{

      const fullName =
        (bet.users?.full_name || "")
        .toLowerCase();

      const userEmail =
        (bet.users?.email || "")
        .toLowerCase();

      const betNumber =
        (bet.selected_number || "")
        .toLowerCase();

      const betStatus =
        (bet.status || "")
        .toLowerCase();

      const betDate =
        new Date(bet.created_at)
        .toISOString()
        .split("T")[0];

      return (

        (!user || fullName.includes(user)) &&
        (!email || userEmail.includes(email)) &&
        (!number || betNumber.includes(number)) &&
        (!status || betStatus === status) &&
        (!date || betDate === date)

      );

    });

  renderFilteredData(filtered);
}

// CLEAR REPORT FILTERS
window.clearFilters = function(){

  document.getElementById("filterUser").value="";
  document.getElementById("filterEmail").value="";
  document.getElementById("filterNumber").value="";
  document.getElementById("filterStatus").value="";
  document.getElementById("filterDate").value="";

  renderFilteredData(allBetData);
}
// LOGOUT ADMIN
window.logoutAdmin = async function(){

  try{

    const { error } =
      await supabase.auth.signOut();

    if(error){

      console.log(error);

      alert(error.message);
      return;
    }

    localStorage.clear();

    sessionStorage.clear();

    window.location.href = "login.html";

  }catch(err){

    console.log(err);

    alert("Logout Failed");
  }
}
// INIT
window.onload = async ()=>{

  await loadUsers();

  await loadAllBetData();

}
</script>
</body>
</html>

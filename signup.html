<script type="module">

import { supabase } from "./supabase.js";

async function signup() {

  const btn =
    document.getElementById("signupBtn");

  try {

    const fullName =
      document
        .getElementById("fullName")
        .value
        .trim();

    const phone =
      document
        .getElementById("phone")
        .value
        .trim();

    const email =
      document
        .getElementById("email")
        .value
        .trim()
        .toLowerCase();

    const password =
      document
        .getElementById("password")
        .value;

    if (
      !fullName ||
      !phone ||
      !email ||
      !password
    ) {
      alert("Please fill all fields");
      return;
    }

    if (password.length < 6) {
      alert(
        "Password minimum 6 characters"
      );
      return;
    }

    btn.disabled = true;

    btn.innerText =
      "Creating Account...";



    // CREATE AUTH USER

    const {
      data,
      error
    } =
      await supabase.auth.signUp({

        email,

        password

      });

    if (error) {
      throw error;
    }

    const user = data.user;

    if (!user) {
      throw new Error(
        "User creation failed"
      );
    }



    // SAVE PROFILE

    const {
      error: profileError
    } =
      await supabase
        .from("users")
        .insert([
          {

            id: user.id,

            full_name: fullName,

            email,

            phone,

            balance: 0

          }
        ]);

    if (profileError) {
      throw profileError;
    }



    // AUTO LOGIN

    const {
      error: loginError
    } =
      await supabase.auth
        .signInWithPassword({

          email,

          password

        });

    if (loginError) {
      throw loginError;
    }



    alert(
      "Account created successfully"
    );

    window.location.href =
      "dashboard.html";



  } catch (err) {

    alert(err.message);

    console.error(err);

  } finally {

    btn.disabled = false;

    btn.innerText =
      "Create Account";

  }

}

window.signup = signup;

</script>

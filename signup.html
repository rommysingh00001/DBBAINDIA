<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up - DBBA INDIA</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="./supabase.js"></script>
</head>
<body class="bg-[#050816] text-white flex items-center justify-center h-screen">

<div class="w-full max-w-md p-6 bg-gray-900 rounded-xl shadow-lg">
  <h1 class="text-2xl font-bold mb-6 text-center">Sign Up</h1>

  <form id="signupForm" class="space-y-4">
    <div>
      <label for="full_name" class="block mb-1">Full Name</label>
      <input type="text" id="full_name" name="full_name" required class="w-full p-2 rounded bg-gray-800 text-white"/>
    </div>

    <div>
      <label for="email" class="block mb-1">Email</label>
      <input type="email" id="email" name="email" required class="w-full p-2 rounded bg-gray-800 text-white"/>
    </div>

    <div>
      <label for="password" class="block mb-1">Password</label>
      <input type="password" id="password" name="password" required class="w-full p-2 rounded bg-gray-800 text-white"/>
    </div>

    <div>
      <button type="submit" class="w-full p-2 bg-blue-600 rounded hover:bg-blue-700 transition">Sign Up</button>
    </div>

    <p class="text-sm text-center">
      Already have an account? <a href="login.html" class="text-blue-500">Login</a>
    </p>
    <p id="errorMsg" class="text-red-500 text-center mt-2"></p>
  </form>
</div>

<script type="module">
  import { supabase } from './supabase.js';

  const form = document.getElementById('signupForm');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.textContent = '';

    const full_name = form.full_name.value.trim();
    const email = form.email.value.trim();
    const password = form.password.value;

    if (!full_name || !email || !password) {
      errorMsg.textContent = 'All fields are required.';
      return;
    }

    // Supabase sign-up
    const { data, error } = await supabase.auth.signUp({
      email,
      password
    });

    if (error) {
      errorMsg.textContent = error.message;
      return;
    }

    // Add extra info to profiles table
    const { error: profileError } = await supabase
      .from('profiles')
      .insert([{ id: data.user.id, full_name }]);

    if (profileError) {
      errorMsg.textContent = profileError.message;
      return;
    }

    // Success
    alert('Sign-up successful! Please verify your email.');
    window.location.href = 'login.html';
  });
</script>

</body>
</html>

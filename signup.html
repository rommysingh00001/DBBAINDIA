<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Signup - DBBA INDIA</title>

  <link
    rel="icon"
    type="image/png"
    href="logo.png"
  />

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#050816] text-white min-h-screen flex items-center justify-center p-5 overflow-y-auto">

  <!-- BACKGROUND -->
  <div class="fixed inset-0 -z-10 overflow-hidden">

    <div class="absolute top-[-120px] left-[-120px] w-[350px] h-[350px] bg-green-500/10 rounded-full blur-3xl"></div>

    <div class="absolute bottom-[-120px] right-[-120px] w-[350px] h-[350px] bg-yellow-500/10 rounded-full blur-3xl"></div>

  </div>

  <!-- CARD -->
  <div class="w-full max-w-md">

    <!-- LOGO -->
    <div class="text-center mb-8">

      <img
        src="logo.png"
        alt="Logo"
        class="w-32 h-32 object-contain mx-auto mb-4 drop-shadow-[0_0_30px_rgba(34,197,94,0.4)]"
      />

      <h1 class="text-5xl font-black">

        <span class="text-yellow-400">
          DBBA
        </span>

        <span class="text-green-400">
          INDIA
        </span>

      </h1>

      <p class="text-gray-400 mt-3 text-lg">
        Create Your Account
      </p>

    </div>

    <!-- FORM -->
    <div class="bg-[#0b1220]/90 backdrop-blur-xl border border-gray-800 rounded-[35px] p-8 shadow-2xl">

      <!-- FULL NAME -->
      <div class="mb-5">

        <label class="block text-sm text-gray-400 mb-2">
          Full Name
        </label>

        <input
          id="fullName"
          type="text"
          placeholder="Enter Full Name"
          class="w-full bg-black border border-gray-700 rounded-2xl p-4 outline-none focus:border-green-500 transition"
        />

      </div>

      <!-- PHONE -->
      <div class="mb-5">

        <label class="block text-sm text-gray-400 mb-2">
          Phone Number
        </label>

        <input
          id="phone"
          type="tel"
          maxlength="10"
          placeholder="Enter Phone Number"
          class="w-full bg-black border border-gray-700 rounded-2xl p-4 outline-none focus:border-green-500 transition"
        />

      </div>

      <!-- EMAIL -->
      <div class="mb-5">

        <label class="block text-sm text-gray-400 mb-2">
          Email Address
        </label>

        <input
          id="email"
          type="email"
          placeholder="Enter Email Address"
          class="w-full bg-black border border-gray-700 rounded-2xl p-4 outline-none focus:border-green-500 transition"
        />

      </div>

      <!-- PASSWORD -->
      <div class="mb-3">

        <label class="block text-sm text-gray-400 mb-2">
          Password
        </label>

        <div class="relative">

          <input
            id="password"
            type="password"
            placeholder="Enter Password"
            class="w-full bg-black border border-gray-700 rounded-2xl p-4 pr-14 outline-none focus:border-green-500 transition"
          />

          <button
            type="button"
            id="togglePassword"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white"
          >
            👁️
          </button>

        </div>

      </div>

      <!-- PASSWORD STRENGTH -->
      <div class="mb-5">

        <div class="w-full h-2 bg-black rounded-full overflow-hidden">

          <div
            id="passwordStrength"
            class="h-full w-0 transition-all duration-300"
          ></div>

        </div>

        <p
          id="passwordText"
          class="text-xs text-gray-500 mt-2"
        >
          Password strength
        </p>

      </div>

      <!-- TERMS -->
      <div class="flex items-start gap-3 mb-6">

        <input
          type="checkbox"
          id="terms"
          class="mt-1"
        />

        <label
          for="terms"
          class="text-sm text-gray-400 leading-6 cursor-pointer"
        >
          I agree to the Terms & Conditions and confirm that this platform uses virtual coins only.
        </label>

      </div>

      <!-- BUTTON -->
      <button
        id="signupBtn"
        onclick="signup()"
        class="w-full bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-2xl text-lg transition duration-300 shadow-lg"
      >
        CREATE ACCOUNT
      </button>

      <!-- LOGIN -->
      <div class="text-center mt-6">

        <a
          href="login.html"
          class="text-yellow-400 font-bold hover:text-yellow-300 transition"
        >
          Already Have Account? Login
        </a>

      </div>

    </div>

  </div>

  <!-- SCRIPT -->
  <script type="module">

    import { supabase } from "./supabase.js";

    // PASSWORD TOGGLE
    const passwordInput =
      document.getElementById("password");

    document
      .getElementById("togglePassword")
      .addEventListener("click", () => {

        if(passwordInput.type === "password"){

          passwordInput.type = "text";

        } else {

          passwordInput.type = "password";

        }

      });

    // PASSWORD STRENGTH
    passwordInput.addEventListener("input", () => {

      const value =
        passwordInput.value;

      const bar =
        document.getElementById("passwordStrength");

      const text =
        document.getElementById("passwordText");

      let strength = 0;

      if(value.length >= 6) strength++;
      if(/[A-Z]/.test(value)) strength++;
      if(/[0-9]/.test(value)) strength++;
      if(/[^A-Za-z0-9]/.test(value)) strength++;

      if(strength === 0){

        bar.style.width = "0%";
        bar.className = "h-full";
        text.innerText = "Password strength";

      }

      if(strength === 1){

        bar.style.width = "25%";
        bar.className = "h-full bg-red-500";
        text.innerText = "Weak Password";

      }

      if(strength === 2){

        bar.style.width = "50%";
        bar.className = "h-full bg-yellow-500";
        text.innerText = "Medium Password";

      }

      if(strength === 3){

        bar.style.width = "75%";
        bar.className = "h-full bg-blue-500";
        text.innerText = "Strong Password";

      }

      if(strength === 4){

        bar.style.width = "100%";
        bar.className = "h-full bg-green-500";
        text.innerText = "Very Strong Password";

      }

    });

    // SIGNUP FUNCTION
    window.signup = async function () {

      const fullName =
        document.getElementById("fullName").value.trim();

      const phone =
        document.getElementById("phone").value.trim();

      const email =
        document.getElementById("email").value.trim();

      const password =
        document.getElementById("password").value.trim();

      const terms =
        document.getElementById("terms").checked;

      const signupBtn =
        document.getElementById("signupBtn");

      // VALIDATION
      if(!fullName || !phone || !email || !password){

        alert("Please fill all fields");
        return;

      }

      if(phone.length !== 10){

        alert("Enter valid 10 digit phone number");
        return;

      }

      if(password.length < 6){

        alert("Password must be minimum 6 characters");
        return;

      }

      if(!terms){

        alert("Please accept Terms & Conditions");
        return;

      }

      try {

        signupBtn.disabled = true;

        signupBtn.innerText =
          "PLEASE WAIT...";

        // CREATE AUTH USER
        const { data, error } =
          await supabase.auth.signUp({

            email,
            password

          });

        console.log(data);

        if(error){

          throw error;

        }

        // GET USER SAFELY
        const user =
          data?.user ||
          data?.session?.user;

        // EMAIL CONFIRMATION CASE
        if(!user){

          alert(
            "Signup successful. Please verify your email."
          );

          return;

        }

        // SAVE DATABASE
        const {
          error: insertError
        } =
          await supabase
            .from("users")
            .insert([

              {
                id: user.id,
                full_name: fullName,
                email: email,
                phone: phone,
                balance: 0
              }

            ]);

        if(insertError){

          console.log(insertError);

          throw insertError;

        }

        alert(
          "Account Created Successfully"
        );

        window.location.href =
          "login.html";

      } catch(err){

        console.log(err);

        alert(err.message);

      } finally {

        signupBtn.disabled = false;

        signupBtn.innerText =
          "CREATE ACCOUNT";

      }

    };

    // ENTER KEY SUPPORT
    document.addEventListener(
      "keydown",
      function(event){

        if(event.key === "Enter"){

          signup();

        }

      }
    );

  </script>

</body>
</html>
